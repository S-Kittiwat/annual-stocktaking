function _openPrintWindow() {
  if (!_lastPrintHtml) { showToast('ยังไม่มีเอกสาร — กดสร้างเอกสารก่อน', 'warn'); return; }
  var w = window.open('', '_blank');
  if (!w) { showToast('เบราว์เซอร์บล็อก popup — อนุญาตก่อน', 'warn'); return; }
  w.document.open(); w.document.write(_lastPrintHtml); w.document.close();
}

function _showPrintLinkModal(url, fname) {
  // สร้าง modal แสดง link + ปุ่ม copy
  var existing = document.getElementById('printLinkModal');
  if (existing) existing.remove();

  var modal = document.createElement('div');
  modal.id = 'printLinkModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML =
    '<div style="background:#fff;border-radius:12px;padding:24px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.2);">'+
      '<div style="font-size:32px;text-align:center;margin-bottom:8px;">📄</div>'+
      '<div style="font-size:15px;font-weight:700;text-align:center;margin-bottom:4px;">เอกสารพร้อมแล้ว</div>'+
      '<div style="font-size:12px;color:#666;text-align:center;line-height:1.6;margin-bottom:14px;">📱➜💻 <b>ใช้มือถือ:</b> กด “Copy Link” แล้วส่งลิงก์ไปเปิดที่<b>คอม</b><br>กดลิงก์ที่คอม → ไฟล์ HTML จะถูกดาวน์โหลด → เปิดแล้วสั่งพิมพ์ออกมาเซ็น</div>'+
      '<div style="background:#f3f0e8;border:1.5px solid #d4c99a;border-radius:8px;padding:10px 12px;font-size:12px;font-family:monospace;word-break:break-all;margin-bottom:12px;color:#1a1612;" id="printLinkText">'+url+'</div>'+
      '<div style="display:flex;gap:8px;">'+
        '<button id="btnCopyLink" style="flex:1;background:#f5c842;border:none;border-radius:8px;padding:12px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;min-height:44px;">📋 Copy Link</button>'+
        '<button id="btnOpenLink" style="flex:1;background:#1e293b;border:none;border-radius:8px;padding:12px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;min-height:44px;color:#fff;">🔗 Open Link</button>'+
        '<button id="btnCloseModal" style="flex:1;background:#f3f0e8;border:1.5px solid #d4c99a;border-radius:8px;padding:12px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;min-height:44px;">ปิด</button>'+
      '</div>'+
      '<div style="font-size:11px;color:#888;text-align:center;margin-top:10px;line-height:1.5;">'+
        '<b>Copy Link</b> = คัดลอกไปส่งต่อ · <b>Open Link</b> = เปิด/โหลดไฟล์เลย<br>ไฟล์: '+fname+'</div>'+
    '</div>';
  document.body.appendChild(modal);
  document.getElementById('btnCopyLink').addEventListener('click', function(){ _copyPrintLink(url); });
  document.getElementById('btnCloseModal').addEventListener('click', function(){ modal.remove(); });
  document.getElementById('btnOpenLink').addEventListener('click', function(){ window.open(url, '_blank'); });
}

function _copyPrintLink(url) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(function(){
      showToast('✅ Copy แล้ว — วาง link ในคอมเพื่อเปิด', 'success');
    });
  } else {
    // fallback สำหรับ browser เก่า
    var el = document.getElementById('printLinkText');
    var range = document.createRange();
    range.selectNode(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    window.getSelection().removeAllRanges();
    showToast('✅ Copy แล้ว — วาง link ในคอมเพื่อเปิด', 'success');
  }
}

function _renderFileList() {
  return files.map(function(f,i){
    return '<div class="file-item"><span>📄</span><span class="fname">'+esc(f.name)+'</span>'+
      '<span style="font-size:11px;color:var(--muted);">'+_fmtSize(f.size)+'</span>'+
      '<button class="fdel" onclick="removeFile('+i+')" title="ลบ">✕</button></div>';
  }).join('');
}
function _fmtSize(b){if(b<1024)return b+'B';if(b<1048576)return Math.round(b/1024)+'KB';return (b/1048576).toFixed(1)+'MB';}


// ── Submit ────────────────────────────────────────────────
async function submitCount() {
  if (!locations.length) return;
  var btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>กำลังส่ง...';

  try {
    // upload ไฟล์ก่อน — ไฟล์แรก = รายงานที่เซ็นแล้ว ใช้เป็น pdf_url
    var fileUrls = [];
    for (var i = 0; i < files.length; i++) {
      var url = await uploadFile(files[i], { kind:'report', extra:(i+1) });
      if (url) fileUrls.push(url);
    }
    // upload ไฟล์หลักฐานนอกระบบ PCS (คนละชุด)
    var offUrls = [];
    for (var j = 0; j < offPcsFiles.length; j++) {
      var ou = await uploadFile(offPcsFiles[j], { kind:'offpcs', extra:(j+1) });
      if (ou) offUrls.push(ou);
    }

    // upload รูปถ่ายราย Location (ขั้นที่ 2) → เก็บเป็น URL (เดิมถูกทิ้ง)
    // และแทน base64 ใน locations ด้วย URL เพื่อลดขนาด payload มหาศาล
    var locPhotos    = [];
    var locationsOut = [];
    for (var li = 0; li < locations.length; li++) {
      var L = locations[li];
      var lurl = '', lid = '';
      if (L.photo && /^data:/.test(L.photo)) {
        var up = await _uploadDataUrl(L.photo, _buildFileName('loc.jpg', { kind:'loc', extra:L.name }));
        lurl = up.url; lid = up.id;                    // ถ่ายใหม่ → อัปขึ้น Drive
      } else if (L._photoUrl || (L.photo && /^https?:/.test(L.photo))) {
        lurl = L._photoUrl || L.photo;                 // รูปเดิม (reopen) → ใช้ไฟล์เดิม ไม่อัปซ้ำ
        lid  = L._photoId || '';
      }
      if (lurl) locPhotos.push({ name:L.name, url:lurl, id:lid });
      var copy = JSON.parse(JSON.stringify(L));
      delete copy._photoUrl; delete copy._photoId;     // ตัด field ชั่วคราวออก
      delete copy.photo_url; delete copy.photo_id; delete copy.photo_thumb;
      copy.photo = lurl;   // เก็บ URL (ไม่ใช่ base64) ใน locations_json
      locationsOut.push(copy);
    }

    var tot = _calcTotals();
    var tmpId = 'SC-' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '-' + Math.floor(Math.random()*900+100);

    var payload = {
      action        : 'submitCount',
      round         : session.round,
      site          : session.site,
      site_id       : session.site_id || _siteIdByName(session.site),
      counter_name  : session.name,
      timestamp     : new Date().toISOString(),
      locations     : locationsOut,
      location_photos: locPhotos,
      // ── contract ใหม่ ──
      actual        : { loscam:tot.totLoscam, chep:tot.totChep, brs:tot.totBrs, swwi:tot.totSwwi },
      off_pcs       : {
        loscam: offPcs.loscam||0, chep: offPcs.chep||0,
        brs:    offPcs.brs||0,    swwi: offPcs.swwi||0,
        files:  offUrls
      },
      production    : {
        loscam: tot.loscam['พาเลทที่ใช้ในสายการผลิต']||0,
        chep:   tot.chep['พาเลทที่ใช้ในสายการผลิต']||0,
        brs:    tot.brs['พาเลทที่ใช้ในสายการผลิต']||0,
        swwi:   tot.swwi['พาเลทที่ใช้ในสายการผลิต']||0
      },
      pdf_url       : fileUrls[0] || '',
      // ── เผื่อ backward-compat ──
      total_loscam  : tot.totLoscam,
      total_chep    : tot.totChep,
      total_brs     : tot.totBrs,
      total_swwi    : tot.totSwwi,
      total_wood    : tot.totWood,
      total_plastic : tot.totPlastic,
      grand_total   : tot.grand,
      file_urls     : fileUrls,
      status        : 'pending'
    };

    var res  = await fetch(API_URL, {
      method:'POST', redirect:'follow',
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify(payload)
    });
    var data = await res.json();
    if (data.status !== 'ok') throw new Error(data.message || 'Error');

    var newId = data.count_id || tmpId;
    var revTxt = (data.revision && data.revision > 1) ? ' (ฉบับแก้ไขครั้งที่ '+data.revision+')' : '';
    // ตั้งสถานะเป็น pending ทันที → ปิด overlay แล้วจะเข้าหน้าจอล็อก "รออนุมัติ" (ข้อ 5)
    siteSubmission = { count_id: newId, revision: data.revision || 1, status: 'pending', review_comment: '' };
    document.getElementById('successId').textContent = newId + revTxt;
    document.getElementById('successOverlay').classList.add('open');
  } catch(err) {
    showToast('ส่งไม่สำเร็จ: '+err.message, 'error');
    btn.disabled = false;
    btn.innerHTML = '📤 Submit ผลการนับ';
  }
}

// ── ตั้งชื่อไฟล์ให้บอกได้ว่าเป็นของ site ไหน + ปลอดภัยข้ามระบบ ──
// รูปแบบ: {siteId}_{siteName}__{kind[-extra]}__{yyyymmdd-hhmmss}.{ext}
function _fileTs() {
  var d = new Date(), p = function(n){ return ('0'+n).slice(-2); };
  return d.getFullYear() + p(d.getMonth()+1) + p(d.getDate()) + '-' +
         p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds());
}
function _safeSeg(s, max) {
  var out = String(s == null ? '' : s)
    .replace(/[\/\\:*?"<>|\u0000-\u001F]/g, '_')  // อักขระต้องห้าม + control
    .replace(/\s+/g, '_')
    .replace(/_+/g, '_')
    .replace(/^[._]+|[._]+$/g, '');               // ตัดจุด/ขีดล่างหัวท้าย
  return out.slice(0, max || 40) || '_';
}
function _extOf(name, def) {
  var m = String(name || '').match(/\.([A-Za-z0-9]{1,8})$/);
  return m ? m[1].toLowerCase() : (def || 'jpg');
}
function _buildFileName(origName, opts) {
  opts = opts || {};
  var sid = opts.siteId != null ? opts.siteId : ((session && session.site_id) ? session.site_id : '');
  var snm = opts.site   != null ? opts.site   : ((session && session.site)   ? session.site   : 'site');
  var parts = [];
  if (sid) parts.push(_safeSeg(sid, 24));
  parts.push(_safeSeg(snm, 40));
  var kind = (opts.kind || 'file') +
             (opts.extra != null && opts.extra !== '' ? '-' + _safeSeg(opts.extra, 24) : '');
  parts.push(_safeSeg(kind, 50));
  parts.push(_fileTs());
  return parts.join('__').slice(0, 150) + '.' + _extOf(origName, opts.defExt);
}

// อัป base64 dataURL ตรง ๆ → คืน { url, id, thumb }
function _uploadDataUrl(dataUrl, filename) {
  return fetch(API_URL, {
    method:'POST', redirect:'follow', headers:{'Content-Type':'text/plain'},
    body: JSON.stringify({ action:'uploadFile', filename:filename, data:dataUrl })
  })
  .then(function(r){ return r.json(); })
  .then(function(d){ return { url: d.url || '', id: d.fileId || '', thumb: d.thumb || '' }; })
  .catch(function(){ return { url:'', id:'', thumb:'' }; });
}

// อัปไฟล์ (File/Blob) → คืน URL (string). opts = { kind, extra, site, siteId }
async function uploadFile(file, opts) {
  return new Promise(function(resolve) {
    var reader = new FileReader();
    reader.onload = function(e) {
      _uploadDataUrl(e.target.result, _buildFileName(file.name, opts))
        .then(function(res){ resolve(res.url || ''); });
    };
    reader.readAsDataURL(file);
  });
}

function resetSession() {
  localStorage.removeItem('stockCountSession');
  localStorage.removeItem('stockCountLocations');
  session = null;
  locations = [];
  files = [];
  siteSubmission = null;
  document.getElementById('successOverlay').classList.remove('open');
  render();
}

// ปิด overlay หลัง submit — คงยอดที่นับไว้ (เผื่อ Admin ตีกลับจะได้แก้ต่อ) แต่ล็อกหน้า "รออนุมัติ"
function closeSuccess() {
  _printed = false; // ถ้าถูกตีกลับแล้วส่งใหม่ ต้องพิมพ์เอกสารใหม่ (เลขฉบับแก้ไข)
  document.getElementById('successOverlay').classList.remove('open');
  render(); // siteSubmission = pending → เข้าหน้าจอล็อก (ข้อ 5)
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast '+(type||'info')+' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 3000);
}
