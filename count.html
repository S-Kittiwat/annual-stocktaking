<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>StockCount — นับสต็อก Pallet</title>
<script src="stockcount_config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root {
  --bg:        #f8f6f1;
  --surface:   #ffffff;
  --surface2:  #f3f0e8;
  --border:    #e5dfc8;
  --border2:   #d4c99a;
  --accent:    #C89B2E;
  --accent2:   #F5C842;
  --accent-bg: #FEF9EC;
  --success:   #2e7d32;
  --success-bg:#e8f5e9;
  --warn:      #b45309;
  --warn-bg:   #fef3c7;
  --danger:    #c62828;
  --danger-bg: #fdecea;
  --text:      #1a1612;
  --text2:     #4a3f2f;
  --muted:     #8a7a5e;
  --chep:      #1565c0;
  --loscam:    #c62828;
  --brs:       #e65100;
  --font:      'IBM Plex Sans Thai', sans-serif;
  --mono:      'IBM Plex Mono', monospace;
  --r:12px; --rs:8px;
  --shadow:    0 1px 4px rgba(100,80,20,.08), 0 4px 16px rgba(100,80,20,.06);
  --shadow-sm: 0 1px 3px rgba(100,80,20,.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}

/* ── Topnav ── */
.topnav{height:56px;background:var(--surface);border-bottom:2px solid var(--accent2);display:flex;align-items:center;padding:0 24px;gap:0;position:sticky;top:0;z-index:200;box-shadow:var(--shadow-sm);}
.nav-brand{display:flex;align-items:center;gap:10px;margin-right:24px;text-decoration:none;}
.nav-brand-icon{width:36px;height:36px;background:var(--accent2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 6px rgba(245,200,66,.4);}
.nav-brand-name{font-size:15px;font-weight:700;color:var(--text);}
.nav-brand-sub{font-size:10px;color:var(--muted);}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.nav-user-name{font-size:12px;font-weight:600;color:var(--text);}
.nav-user-site{font-size:10px;color:var(--accent);}
.btn-admin{background:var(--accent-bg);border:1px solid var(--border2);color:var(--accent);border-radius:var(--rs);padding:5px 12px;font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px;transition:all .15s;}
.btn-admin:hover{background:var(--accent2);color:var(--text);border-color:var(--accent);}
.btn-clear{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--font);transition:color .15s;}
.btn-clear:hover{color:var(--danger);}

/* ── Page ── */
.page{min-height:calc(100vh - 56px);}
.content{padding:20px 24px 160px;max-width:820px;margin:0 auto;display:flex;flex-direction:column;gap:14px;}

/* ── Round banner ── */
.round-hero{background:linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%);border-radius:var(--r);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 4px 16px rgba(200,155,46,.25);}
.round-hero-left{display:flex;align-items:center;gap:14px;}
.round-hero-icon{width:44px;height:44px;background:rgba(255,255,255,.25);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.round-hero-title{font-size:17px;font-weight:700;color:#1a1612;}
.round-hero-sub{font-size:11px;color:rgba(26,22,18,.6);margin-top:2px;}
.round-hero-open{background:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.5);border-radius:20px;font-size:11px;font-weight:700;color:#1a1612;padding:3px 12px;}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);}
.card.active{border-color:var(--accent2);box-shadow:0 0 0 2px rgba(245,200,66,.15), var(--shadow);}
.card.done{border-color:var(--success);box-shadow:0 0 0 2px rgba(46,125,50,.1), var(--shadow);}
.card.locked{opacity:.5;pointer-events:none;box-shadow:none;}
.card-head{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface2);}
.step-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.step-badge.active{background:var(--accent2);color:#1a1612;}
.step-badge.done{background:var(--success-bg);border:1px solid var(--success);color:var(--success);}
.step-badge.locked{background:var(--border);color:var(--muted);}
.card-title{font-size:13px;font-weight:600;color:var(--text);}
.card-hint{font-size:11px;color:var(--muted);margin-left:auto;}
.card-body{padding:18px;}

/* ── Form ── */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.field:last-child{margin-bottom:0;}
label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;}
.input,.select{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:var(--font);font-size:16px;padding:12px 14px;outline:none;width:100%;min-height:44px;transition:border-color .15s,box-shadow .15s;}
.input:focus,.select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,155,46,.12);}
.input::placeholder{color:var(--muted);opacity:.5;}
.select option{background:var(--surface);}
.btn{border:none;border-radius:var(--rs);padding:12px 18px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;min-height:44px;touch-action:manipulation;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-primary{background:var(--accent2);color:#1a1612;box-shadow:0 2px 8px rgba(245,200,66,.3);}
.btn-primary:hover:not(:disabled){background:var(--accent);color:#fff;}
.btn-success{background:#2e7d32;color:#fff;}
.btn-success:hover:not(:disabled){background:#1b5e20;}
.btn-outline{background:var(--surface);border:1.5px solid var(--border2);color:var(--text2);}
.btn-outline:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}

/* ── Pallet Input Grid (2-col: LOSCAM|CHEP / BRS|SWWI) ── */
.material-section{margin-bottom:18px;}
.material-head{display:flex;align-items:center;gap:8px;padding:8px 0 6px;margin-bottom:8px;border-bottom:2px solid var(--border);}
.material-icon{font-size:16px;}
.material-label{font-size:13px;font-weight:700;color:var(--text);}
.material-total{margin-left:auto;font-size:12px;font-family:var(--mono);font-weight:600;color:var(--muted);}
/* ── 3-column table: Status | Brand1 | Brand2 ── */
.pallet-table{width:100%;border-collapse:collapse;border-radius:var(--rs);overflow:hidden;border:1px solid var(--border);margin-bottom:14px;}
.pallet-table thead th{padding:9px 14px;font-size:11px;font-weight:700;letter-spacing:.04em;border-bottom:2px solid var(--border);text-align:center;background:var(--surface2);}
.pallet-table thead th:first-child{text-align:left;color:var(--muted);font-size:10px;text-transform:uppercase;font-weight:600;}
.pallet-table thead th.loscam-h{color:var(--loscam);background:#fff5f5;}
.pallet-table thead th.chep-h  {color:var(--chep);background:#f0f7ff;}
.pallet-table thead th.brs-h   {color:var(--brs);background:#fff8f0;}
.pallet-table thead th.swwi-h  {color:#2e7d32;background:#f3fbf3;}
.pallet-table tbody tr td{padding:7px 10px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2);}
.pallet-table tbody tr:last-child td{border-bottom:none;}
.pallet-table tbody tr:hover td{background:#fafaf7;}
.pallet-table td.inp-cell{text-align:center;padding:4px 8px;}
.pallet-table tfoot td{padding:8px 14px;font-weight:700;font-size:13px;background:var(--surface2);border-top:2px solid var(--border);text-align:center;}
.pallet-table tfoot td:first-child{text-align:left;}
.status-input{background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:#1a1612;font-family:var(--mono);font-size:16px;font-weight:600;padding:10px 6px;width:64px;min-height:44px;text-align:center;outline:none;transition:border-color .15s;touch-action:manipulation;}
.status-input:focus{border-color:var(--accent);background:#fff;}
.status-input.has-val{background:#fffef0;border-color:var(--accent2);}
/* ── Location chips (updated for new structure) ── */
.loc-chip{font-size:11px;font-family:var(--mono);font-weight:700;padding:2px 9px;border-radius:20px;}
.loc-chip.loscam{background:#ffebee;color:var(--loscam);border:1px solid #ffcdd2;}
.loc-chip.chep  {background:#e3f2fd;color:var(--chep);border:1px solid #bbdefb;}
.loc-chip.brs   {background:#fff3e0;color:var(--brs);border:1px solid #ffe0b2;}
.loc-chip.swwi  {background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;}
/* ── Summary ── */
.sum-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.sum-card{border-radius:var(--rs);padding:14px;border:1.5px solid;}
.sum-card.wood   {background:#fdf6e3;border-color:#d4c99a;grid-column:1/-1;}
.sum-card.plastic{background:#f0f4ff;border-color:#b0c4de;grid-column:1/-1;}
.sum-card.loscam {background:#ffebee;border-color:#ef9a9a;}
.sum-card.chep   {background:#e3f2fd;border-color:#90caf9;}
.sum-card.brs    {background:#fff3e0;border-color:#ffcc80;}
.sum-card.swwi   {background:#e8f5e9;border-color:#a5d6a7;}
.sum-num{font-size:24px;font-weight:700;font-family:var(--mono);color:#1a1612;}
.sum-lbl{font-size:11px;color:var(--muted);margin-top:2px;font-weight:500;}
.sum-sub{font-size:10px;color:var(--muted);margin-top:1px;}
/* status summary table */
.status-sum-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px;}
.status-sum-table th{text-align:left;padding:6px 10px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);background:var(--surface2);}
.status-sum-table th.r{text-align:right;}
.status-sum-table td{padding:7px 10px;border-bottom:1px solid var(--border);}
.status-sum-table td.r{text-align:right;font-family:var(--mono);font-weight:600;color:#1a1612;}
.status-sum-table tr:last-child td{border-bottom:none;}
.status-sum-table tr.bold-row td{font-weight:700;background:var(--surface2);}
@media(max-width:600px){
  .brand-grid{grid-template-columns:1fr;}
  .sum-grid{grid-template-columns:1fr;}
}
.sum-num{font-size:30px;font-weight:700;font-family:var(--mono);color:#1a1612;}
.sum-lbl{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500;}

/* ── Location table ── */
.loc-table-wrap{border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;margin-bottom:14px;}
.loc-table-wrap table{width:100%;border-collapse:collapse;}
.loc-table-wrap th{background:var(--surface2);padding:8px 14px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;text-align:left;border-bottom:1px solid var(--border);font-weight:700;}
.loc-table-wrap td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);}
.loc-table-wrap tr:last-child td{border-bottom:none;}
.loc-table-wrap tr:hover td{background:var(--surface2);}
.loc-table-wrap tr.total-row td{background:var(--surface2);font-weight:700;font-size:13px;}
td.num{font-family:var(--mono);text-align:right;font-weight:600;color:#1a1612;}
td.chep-c  {color:#1a1612;}
td.loscam-c{color:#1a1612;}
td.brs-c   {color:#1a1612;}
.compare-table{width:100%;border-collapse:collapse;border-radius:var(--rs);overflow:hidden;border:1px solid var(--border);margin-bottom:14px;}
.compare-table th{background:var(--surface2);padding:10px 14px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;text-align:center;border-bottom:1px solid var(--border);font-weight:700;}
.compare-table th:first-child{text-align:left;}
.compare-table td{padding:12px 14px;font-size:15px;font-family:var(--mono);font-weight:700;text-align:center;border-bottom:1px solid var(--border);color:#1a1612;}
.compare-table td:first-child{font-family:var(--font);font-size:12px;color:var(--text2);text-align:left;font-weight:500;}
.compare-table tr:last-child td{border-bottom:none;}
.compare-table .row-physical td{background:#fffef7;}
.compare-table .row-book td{background:#f0f9ff;}
.compare-table .row-var td{background:var(--surface2);font-size:17px;}
.var-pos{color:var(--success);}
.var-neg{color:var(--danger);}
.var-zero{color:var(--muted);}
.book-pending{background:var(--warn-bg);border:1px solid #fcd34d;border-radius:var(--rs);padding:10px 14px;font-size:12px;color:var(--warn);display:flex;align-items:center;gap:8px;margin-bottom:14px;}

/* ── Upload ── */
.upload-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:22px;text-align:center;cursor:pointer;transition:all .15s;background:var(--accent-bg);}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:#fef9d9;}
.upload-zone .icon{font-size:30px;margin-bottom:6px;}
.upload-zone .label{font-size:13px;font-weight:600;color:var(--text2);}
.upload-zone .sub{font-size:11px;color:var(--muted);}
.file-list{display:flex;flex-direction:column;gap:6px;margin-top:10px;}
.file-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:8px 12px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);}
.file-item .fname{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-item .fdel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;}
.file-item .fdel:hover{color:var(--danger);}

/* ── Print button ── */
.btn-print{background:var(--surface);border:1.5px solid var(--border2);color:var(--text2);border-radius:var(--rs);padding:10px 18px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s;box-shadow:var(--shadow-sm);}
.btn-print:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
.btn-print:disabled{opacity:.4;cursor:not-allowed;}

/* ── Submit bar ── */
.submit-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:18px 20px;display:none;flex-direction:column;gap:10px;box-shadow:var(--shadow);}
.submit-card.ready{border-color:var(--success);background:#f0faf0;}
.submit-card .note{font-size:12px;color:var(--muted);}
.step-check{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);}
.step-check.done{color:var(--success);font-weight:600;}
.step-check.pending{color:var(--muted);}

/* ── Resume banner ── */
.resume-banner{background:var(--success-bg);border:1px solid #a5d6a7;border-radius:var(--rs);padding:10px 14px;font-size:12px;color:var(--success);display:flex;align-items:center;gap:8px;}

/* ── Success overlay ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
.overlay.open{display:flex;}
.overlay-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);width:100%;max-width:420px;padding:32px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.overlay-icon{font-size:52px;margin-bottom:14px;}
.overlay-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px;}
.overlay-sub{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:16px;}
.overlay-id{font-family:var(--mono);font-size:12px;color:var(--accent);background:var(--accent-bg);border:1px solid var(--border2);padding:5px 14px;border-radius:20px;margin-bottom:20px;display:inline-block;font-weight:600;}
.round-banner{background:var(--warn-bg);border:1px solid #fcd34d;border-radius:var(--rs);padding:12px 16px;font-size:13px;color:var(--warn);display:flex;align-items:center;gap:8px;margin-bottom:4px;font-weight:500;}

/* ── Loading / Toast ── */
.loading{text-align:center;padding:48px;color:var(--muted);font-size:13px;}
.spinner{width:18px;height:18px;border:2px solid rgba(200,155,46,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-60px);background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--rs);padding:10px 18px;font-size:13px;transition:transform .3s;z-index:999;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.12);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{border-color:#a5d6a7;color:var(--success);background:var(--success-bg);}
.toast.error  {border-color:#ef9a9a;color:var(--danger);background:var(--danger-bg);}
.toast.info   {border-color:var(--border2);color:var(--accent);}

/* ── Location list ── */
.loc-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.loc-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;transition:border-color .2s,background .2s;}
.loc-item-editing{border:2px solid var(--accent);background:#fff8e1;}
.loc-item-top{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.loc-name{font-size:13px;font-weight:700;color:var(--text);flex:1;}
.loc-item-bot{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.loc-total{font-size:12px;font-family:var(--mono);font-weight:700;color:var(--text2);margin-left:auto;padding:0 4px;}
.loc-act{background:none;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:13px;padding:8px 12px;transition:all .15s;font-family:var(--font);min-height:36px;touch-action:manipulation;}
.loc-act.edit{color:var(--accent);}
.loc-act.edit:hover{background:var(--accent-bg);border-color:var(--accent);}
.loc-act.del{color:var(--danger);}
.loc-act.del:hover{background:var(--danger-bg);border-color:var(--danger);}

/* ── Add location ── */
.add-loc-btn{width:100%;background:var(--surface);border:1.5px dashed var(--border2);border-radius:var(--rs);padding:13px;font-family:var(--font);font-size:14px;font-weight:600;color:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;min-height:44px;touch-action:manipulation;}
.add-loc-btn:hover{background:var(--accent-bg);border-color:var(--accent);}
.add-loc-btn.editing{background:#fff8e1;border:1.5px solid var(--accent);color:var(--accent);border-style:solid;}
.add-loc-box{background:var(--accent-bg);border:1.5px solid var(--border2);border-radius:var(--rs);padding:16px;margin-top:8px;display:none;}
.add-loc-box.open{display:block;}
.add-loc-box.editing{background:#fff8e1;border-color:var(--accent);border-width:2px;}
.edit-banner{background:var(--accent2);border-radius:var(--rs);padding:8px 14px;font-size:12px;font-weight:700;color:#1a1612;display:flex;align-items:center;gap:8px;margin-bottom:12px;}

@media(max-width:600px){
  .pallet-grid{grid-template-columns:1fr;}
  .sum-grid{grid-template-columns:1fr;}
  .content{padding:14px 14px 40px;}
  .round-hero{flex-direction:column;align-items:flex-start;}
}
@media print{
  .topnav,.btn-print,.add-loc-box,
  button:not(.no-hide),.overlay{display:none!important;}
  body{background:#fff;}
  .card{box-shadow:none;border:1px solid #ccc;}
}
</style>
</head>
<body>

<!-- Topnav -->
<nav class="topnav">
  <a class="nav-brand" href="#">
    <div class="nav-brand-icon">📦</div>
    <div>
      <div class="nav-brand-name">StockCount</div>
      <div class="nav-brand-sub">นับสต็อก Pallet</div>
    </div>
  </a>
  <div class="nav-right">
    <div id="navUserInfo" style="display:none;">
      <div class="nav-user-name" id="navName">—</div>
      <div class="nav-user-site" id="navSite">—</div>
    </div>
    <button class="btn-clear" id="btnReset" onclick="resetSession()" style="display:none;">↩ เริ่มใหม่</button>

<script>
var API_URL = (typeof STOCKCOUNT_CONFIG !== 'undefined') ? STOCKCOUNT_CONFIG.API_URL : '';

// ── State ─────────────────────────────────────────────────
var session   = null;
var locations = [];   // [{ name, photo, wood:{loscam:{...}, chep:{...}}, plastic:{brs:{...}, swwi:{...}} }]
var files     = [];
var offPcs    = { loscam:0, chep:0, brs:0, swwi:0 };  // ขั้นที่ 3: นอกระบบ PCS ระดับ Site
var offPcsFiles = [];                                  // ไฟล์หลักฐานนอกระบบ (คนละชุดกับใบเซ็น)
var _checkinPhotoFile = null;                          // รูปเช็คอิน (ถือใน memory → อัปตอนเช็คอิน ไม่ลง localStorage)
var _emptyPCS = function(){ return {คงเหลือ:0,ระหว่างโอนออก:0,ระหว่างโอนเข้า:0,ชำรุดเสียหาย:0,สูญหาย:0}; };
var bookBalance = { loscam:_emptyPCS(), chep:_emptyPCS(), brs:_emptyPCS(), swwi:_emptyPCS() };
var _editingIdx   = null;
var _formOpen     = false;
var _formSuccess  = false; // แสดง success state หลังบันทึก
var _lastSaved    = null;  // { name, wl, wc, pb, ps, total }
var _step3Seen  = false;
var _printed    = false; // กดพิมพ์เอกสารแล้วหรือยัง
var _offDone    = false; // กด "จบ/ข้าม" ขั้นที่ 3 แล้วหรือยัง
var _bookReady  = true;  // Admin ใส่ยอดระบบแล้วหรือยัง (จาก checkSiteStatus)

// ── Pallet schema ─────────────────────────────────────────
var WOOD_STATUS    = [
  'พาเลทเปล่า RFI',
  'พาเลทเปล่า TBR',
  'พาเลทเปล่า BER',
  'พาเลทเปล่า TBC',
  'พาเลทเปล่า TBS',
  'พาเลทที่ใช้วางสินค้า',
  'พาเลทที่ใช้ในสายการผลิต'
];
var PLASTIC_STATUS = [
  'พาเลทเปล่า RFI',
  'พาเลทเปล่า TBS',
  'พาเลทที่ใช้วางสินค้า',
  'พาเลทที่ใช้ในสายการผลิต',
  'พาเลทชำรุด รออนุมัติโอนเข้า BRS-900',
  'พาเลทชำรุด โอน BRS-900 แล้ว (ตัวเอง)',
  'พาเลทชำรุด โอน BRS-900 แล้ว (ที่อื่น)'
];

function emptyWood()    { var o={}; WOOD_STATUS.forEach(function(s){o[s]=0;}); return o; }
function emptyPlastic() { var o={}; PLASTIC_STATUS.forEach(function(s){o[s]=0;}); return o; }
function emptyLoc(name) {
  return { name:name, photo:'',
    wood   :{ loscam:emptyWood(),    chep:emptyWood()    },
    plastic:{ brs:emptyPlastic(),    swwi:emptyPlastic() } };
}
function brandTotal(obj) { return Object.values(obj).reduce(function(s,v){return s+Number(v||0);},0); }
function locTotal(loc) {
  return brandTotal(loc.wood.loscam) + brandTotal(loc.wood.chep)
       + brandTotal(loc.plastic.brs) + brandTotal(loc.plastic.swwi);
}

function fetchBookBalance(site) {
  fetch(API_URL + '?action=getBookBalance&site=' + encodeURIComponent(site))
    .then(function(r){ return r.json(); })
    .then(function(data) {
      siteSubmission = data.submission || null; // ส่งแล้ว/ตีกลับ/ล็อก
      siteDocNo = data.doc_no || '';            // เลขที่เอกสารของ site นี้ (Admin)
      if (data.status === 'ok' && data.book) {
        bookBalance = data.book;
      }
      _maybeRestoreFromServer();  // reopen/rejected → เติมข้อมูลเดิมจาก server (แหล่งหลัก)
      render(); // re-render เพื่ออัป comparison + แบนเนอร์สถานะ
    })
    .catch(function(){ render(); }); // ถ้าไม่มีข้อมูลก็แสดง pending
}

// ── Auto-save helper ─────────────────────────────────────
function saveProgress() {
  try {
    // ── ตัด photo base64 ออกก่อน save ลง localStorage ──
    // รูปถ่ายจากกล้องมือถือมีขนาดหลาย MB ต่อรูป ถ้าเก็บไว้ใน
    // localStorage ตรงๆ จะเกิน quota (iOS Safari ~5MB) ทำให้
    // setItem throw error และ "ค้าง" กลางทาง (refreshLocList ไม่ถูกเรียก)
    var slim = locations.map(function(l) {
      var copy = JSON.parse(JSON.stringify(l));
      if (copy.photo) copy.photo = '__HAS_PHOTO__'; // เก็บแค่ flag ไม่เก็บข้อมูลจริง
      return copy;
    });
    localStorage.setItem('stockCountLocations', JSON.stringify(slim));
  } catch(e) {
    console.warn('saveProgress failed (quota exceeded?):', e.message);
    // ไม่ throw ต่อ — ให้ flow หลักทำงานต่อได้แม้ save ไม่สำเร็จ
    showToast('⚠️ บันทึกสำรองไม่สำเร็จ (พื้นที่เก็บข้อมูลเต็ม) แต่ข้อมูลในหน้านี้ยังอยู่', 'error');
  }
}

function loadProgress() {
  try {
    var saved = localStorage.getItem('stockCountLocations');
    if (saved) locations = JSON.parse(saved);
  } catch(e) { locations = []; }
}

// ── Restore จาก server ตอน reopen/rejected (server = แหล่งข้อมูลหลัก) ──
var _serverRestoredKey = null;   // กันเติมซ้ำทับ edit ที่ผู้ใช้กำลังแก้
function _n2(x){ return Number(x) || 0; }
// แปลง location object จาก server → shape ที่หน้าจอใช้ (เติม key ที่ขาดให้ครบ + map รูป)
function _normLocFromServer(L) {
  L = L || {};
  var out = emptyLoc(L.name || '');
  if (L.wood) {
    ['loscam','chep'].forEach(function(b){
      if (L.wood[b]) Object.keys(out.wood[b]).forEach(function(k){ out.wood[b][k] = _n2(L.wood[b][k]); });
    });
  }
  if (L.plastic) {
    ['brs','swwi'].forEach(function(b){
      if (L.plastic[b]) Object.keys(out.plastic[b]).forEach(function(k){ out.plastic[b][k] = _n2(L.plastic[b][k]); });
    });
  }
  // รูปเดิม: ใช้ thumbnail ให้ preview เห็น + จำ url/id เต็มไว้ (resubmit จะไม่อัปซ้ำ)
  out.photo     = L.photo_thumb || L.photo_url || (/^https?:/.test(String(L.photo||'')) ? L.photo : '') || '';
  out._photoUrl = L.photo_url || (/^https?:/.test(String(L.photo||'')) ? L.photo : '') || '';
  out._photoId  = L.photo_id || '';
  return out;
}
function _maybeRestoreFromServer() {
  var s = siteSubmission;
  if (!s) return;
  if (s.status !== 'rejected' && s.status !== 'reopened') return;
  var key = (s.count_id || '') + '#' + (s.revision || '');
  if (_serverRestoredKey === key) return;   // เติมไปแล้วสำหรับใบ/รอบแก้นี้ → ไม่ทับ
  if (Array.isArray(s.locations) && s.locations.length) {
    locations = s.locations.map(_normLocFromServer);
  }
  if (s.off_pcs) {
    offPcs = { loscam:_n2(s.off_pcs.loscam), chep:_n2(s.off_pcs.chep),
               brs:_n2(s.off_pcs.brs),       swwi:_n2(s.off_pcs.swwi) };
  }
  // production เติมกลับอัตโนมัติ — คำนวณจาก locations ตอน submit อยู่แล้ว
  _serverRestoredKey = key;
  try { saveProgress(); } catch(e) {}
}

// ── Init ──────────────────────────────────────────────────
window.onload = function() {
  var saved = localStorage.getItem('stockCountSession');
  if (saved) {
    try { session = JSON.parse(saved); } catch(e) { session = null; }
  }
  if (session) loadProgress(); // restore locations ที่ค้างไว้
  loadConfig();
  // ดึง book + สถานะใบส่ง ของ site ที่ค้างไว้ (ให้ banner ล็อก/ตีกลับโชว์หลัง reload)
  if (session && session.site) fetchBookBalance(session.site);
  startHelpPoll();   // แถบเรียกเจ้าหน้าที่ (จะซ่อนเองถ้ายังไม่มี session / อยู่หน้าล็อก)
};

function loadConfig() {
  fetch(API_URL + '?action=getConfig')
    .then(function(r){ return r.json(); })
    .then(function(data) {
      roundInfo = data.round || { round_name:'นับสต็อก', is_open:true };
      siteList  = data.sites     || [];
      siteObjs  = data.site_objs || siteList.map(function(n){ return { site_id:'', site_name:n }; });
      locList   = data.locations|| [];
      docDate   = data.doc_date || '';     // วันที่ของรอบ (Admin)
      docYear   = data.doc_year || (data.round ? data.round.year : '') || '';
      // โหลด book balance ถ้ามี session อยู่แล้ว
      if (session && data.book_balances) {
        var bb = data.book_balances[session.site];
        if (bb) bookBalance = bb;
      }
      render();
    })
    .catch(function() {
      // เชื่อม backend ไม่ได้ — ไม่ใส่ข้อมูลปลอม แสดงสถานะ error ตามจริง
      roundInfo = { round_name:'', is_open:false };
      siteList  = [];
      siteObjs  = [];
      locList   = [];
      render(); // จะขึ้น banner "ยังไม่มีรอบการนับ — ติดต่อ Admin"
      showToast('❌ เชื่อมต่อ backend ไม่ได้ — ตรวจสอบ stockcount_config.js (API_URL)', 'error');
    });
}

// map ชื่อ site → site_id (จาก backend) เพื่อส่งตอน submit
// unique key ต่อ status (แปลงอักษรที่ไม่ใช่ A-Z0-9_ เป็นรหัส กันชนกันเมื่อเป็นภาษาไทย)
function _statusKey(s){
  return String(s).replace(/\s+/g,'_').replace(/[^A-Za-z0-9_]/g, function(c){ return 'x'+c.charCodeAt(0); });
}
function _siteIdByName(name) {
  for (var i = 0; i < siteObjs.length; i++) {
    if (String(siteObjs[i].site_name).trim() === String(name||'').trim()) return siteObjs[i].site_id || '';
  }
  return '';
}
function _siteLinkByName(name) {
  for (var i = 0; i < siteObjs.length; i++) {
    if (String(siteObjs[i].site_name).trim() === String(name||'').trim()) return siteObjs[i].drive_link || '';
  }
  return '';
}
function openSiteDoc() {
  var link = session ? _siteLinkByName(session.site) : '';
  if (link) window.open(link, '_blank', 'noopener');
}

// ประเมินสถานะใบส่งผลของ site ที่เลือก → คุมแบนเนอร์ + ปุ่ม Submit
//   approved → ล็อก (ต้องให้ Admin เปิดแก้ไขก่อน)
//   rejected / reopened → แก้แล้วส่งใหม่ได้ (เป็นฉบับแก้ไขครั้งถัดไป)
//   pending → ส่งแล้ว รออนุมัติ (ส่งซ้ำจะทับฉบับเดิม)
function _submitGate() {
  var s = siteSubmission;
  if (!s || !s.status) return { banner:'', bannerStyle:'', locked:false, isRevision:false };
  var st = String(s.status);
  if (st === 'approved') {
    return {
      locked:true, isRevision:false,
      bannerStyle:'background:rgba(220,38,38,.08);border:1px solid var(--danger);color:var(--danger);',
      banner:'🔒 Site นี้ส่งผลและ <strong>ได้รับอนุมัติแล้ว</strong> (เลขที่ '+esc(s.count_id)+' · ฉบับที่ '+s.revision+')<br>'
            +'ต้องให้ Admin กด “เปิดแก้ไข” ก่อน จึงจะส่งใหม่ได้'
    };
  }
  if (st === 'rejected' || st === 'reopened') {
    var head = (st==='rejected') ? '↩️ ใบนี้ถูก <strong>ตีกลับ</strong>' : '🔓 Admin <strong>เปิดให้แก้ไข</strong>';
    var cm = s.review_comment
      ? '<div style="margin-top:10px;background:#fff;border:2px solid var(--danger,#dc2626);border-radius:8px;padding:10px 12px;">'
          +'<div style="font-size:11px;font-weight:700;color:var(--danger,#dc2626);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px;">📌 สิ่งที่ต้องแก้ไข (จาก Admin)</div>'
          +'<div style="font-size:15px;font-weight:700;color:#111;line-height:1.5;">'+esc(s.review_comment)+'</div></div>'
      : '';
    return {
      locked:false, isRevision:true,
      bannerStyle:'background:rgba(245,158,11,.12);border:1px solid var(--warn);color:#92400e;',
      banner: head+' (เลขที่ '+esc(s.count_id)+')'+cm+'<div style="margin-top:8px;">แก้ไขแล้วส่งใหม่ได้ — จะเป็น <strong>ฉบับแก้ไขครั้งที่ '+(s.revision+1)+'</strong></div>'
    };
  }
  // pending
  return {
    locked:false, isRevision:false,
    bannerStyle:'background:var(--accent-bg);border:1px solid var(--border2);color:var(--text);',
    banner:'⏳ Site นี้ <strong>ส่งผลแล้ว รออนุมัติ</strong> (เลขที่ '+esc(s.count_id)+' · ฉบับที่ '+s.revision+')<br>'
          +'หากส่งซ้ำ ระบบจะ <strong>ทับฉบับเดิม</strong> (ฉบับที่ '+s.revision+')'
  };
}

// เลขที่เอกสารบนใบพิมพ์ — ฉบับแก้ไขใช้ count_id เดิมเพื่อ match รูปกับ record
function _docRef() {
  var s = siteSubmission;
  if (s && s.count_id) {
    var rev = s.revision;
    if (s.status === 'rejected' || s.status === 'reopened') rev = s.revision + 1;
    return s.count_id + (rev > 1 ? ' (ฉบับแก้ไขครั้งที่ '+rev+')' : '');
  }
  // ฉบับใหม่ — server จะออกเลขจริงตอน Submit
  var y = (roundInfo && roundInfo.year) ? roundInfo.year : '____';
  return 'BRS-SC-' + y + '-(ออกเลขเมื่อ Submit)';
}

// ── Render ────────────────────────────────────────────────
var _renderVersion = 0; // ใช้ cancel stale setTimeout

function render() {
  _renderVersion++;
  var content = document.getElementById('mainContent');

  if (!roundInfo || !roundInfo.is_open) {
    content.innerHTML = '<div class="round-banner">⚠️ ขณะนี้ยังไม่มีรอบการนับที่เปิดอยู่ — กรุณาติดต่อ Admin</div>';
    return;
  }

  if (!session) {
    renderStep1(content);
  } else if (siteSubmission && (siteSubmission.status === 'approved' || siteSubmission.status === 'pending')) {
    // ส่งแล้ว (รออนุมัติ) หรืออนุมัติแล้ว → ล็อกทั้งหน้า ห้ามแก้/นับซ้ำ
    _renderLockScreen(content, siteSubmission.status);
  } else {
    renderStep2(content);
    // แสดง banner ถ้ามีข้อมูลค้างอยู่
    if (locations.length > 0) {
      var banner = document.createElement('div');
      banner.className = 'resume-banner';
      banner.innerHTML = '💾 มีข้อมูลค้างอยู่จากครั้งก่อน — '+locations.length+' Location (รวม '
        + locations.reduce(function(s,l){return s+Number(l.chep||0)+Number(l.loscam||0)+Number(l.brs||0);},0)
        + ' ใบ) ถูกโหลดกลับมาแล้ว';
      content.insertBefore(banner, content.firstChild);
    }
    // แบนเนอร์สถานะใบส่งผล (ตีกลับ/เปิดแก้ไข) — ให้อยู่บนสุด
    var sb = _submitGate();
    if (sb.banner) {
      var sbar = document.createElement('div');
      sbar.style.cssText = 'border-radius:var(--rs);padding:12px 14px;margin-bottom:12px;font-size:13px;font-weight:600;line-height:1.5;'+sb.bannerStyle;
      sbar.innerHTML = sb.banner;
      content.insertBefore(sbar, content.firstChild);
    }
  }
}

// หน้าจอล็อกหลังส่งผล — pending (รออนุมัติ) / approved (อนุมัติแล้ว)

        '<div style="font-size:14px;color:var(--text);line-height:1.6;">เลขที่ <strong>'+esc(s.count_id||'')+'</strong> · ฉบับที่ '+(s.revision||1)+'<br>'+
          'ต้องให้ Admin กด <strong>“เปิดแก้ไข”</strong> ก่อน จึงจะส่งใหม่ได้</div>'+
        '<div style="display:flex;gap:8px;margin-top:20px;">'+
          '<button class="btn btn-outline" onclick="recheckStatus()" style="flex:1;">🔄 ตรวจสอบสถานะ</button>'+

    html =
      '<div style="border:1px solid var(--warn);background:rgba(245,158,11,.08);border-radius:var(--rl);padding:28px 22px;text-align:center;margin-top:8px;">'+
        '<div style="font-size:44px;line-height:1;margin-bottom:12px;">⏳</div>'+
        '<div style="font-size:17px;font-weight:800;color:#92400e;margin-bottom:10px;">ส่งผลการนับแล้ว — รอ Admin ตรวจสอบ/อนุมัติ</div>'+
        '<div style="font-size:14px;color:var(--text);line-height:1.6;">เลขที่ <strong>'+esc(s.count_id||'')+'</strong> · ฉบับที่ '+(s.revision||1)+'</div>'+
        '<div id="queueStatusBox" style="margin-top:16px;padding:14px;border-radius:var(--rs);background:var(--surface);border:1px solid var(--border);font-size:14px;color:var(--muted);"><span class="spinner"></span> กำลังตรวจสอบคิว…</div>'+

}

// ── หน้ารอคิว: poll สถานะคิวของ Site เป็นระยะ ──
var _sitePollTimer = null;
function stopSitePoll(){ if(_sitePollTimer){ clearInterval(_sitePollTimer); _sitePollTimer=null; } }
function startSitePoll(){
  stopSitePoll();
  pollSiteQueue();
  _sitePollTimer = setInterval(pollSiteQueue, 10000);
}
async function pollSiteQueue(){
  if(!session || !session.site) return;
  var box = document.getElementById('queueStatusBox');
  if(!box){ stopSitePoll(); return; }
  var d = null;
  try {
    var res = await fetch(API_URL + '?action=getSiteQueueStatus&site=' + encodeURIComponent(session.site) + '&site_id=' + encodeURIComponent(_siteIdByName(session.site)));
    d = await res.json();
  } catch(e) {}
  if(!d || d.status!=='ok'){ return; }
  // ถ้าสถานะใบเปลี่ยน (อนุมัติ/ตีกลับ) → รีเฟรชหน้า
  if(d.sub_status==='approved' || d.sub_status==='rejected' || d.sub_status==='reopened'){
    stopSitePoll(); if(session&&session.site) fetchBookBalance(session.site); return;
  }
  if(d.queue_state==='checking'){
    var link = d.room_link || '';
    box.style.background='rgba(16,110,86,.1)'; box.style.borderColor='var(--success,#0f6e56)'; box.style.color='var(--success,#0f6e56)';
    box.innerHTML = '🟢 <b>ถึงคิวแล้ว!</b> เจ้าหน้าที่ <b>'+esc(d.agent_name||'')+'</b> กำลังตรวจ'
      + (link ? '<br><button class="btn btn-success" onclick="window.open(\''+esc(link)+'\',\'_blank\',\'noopener\')" style="width:100%;margin-top:10px;">🎥 เข้าห้อง Teams'+(d.room?(' — '+esc(d.room)):'')+'</button>'
              : '<br><span style="font-size:12px;">(เจ้าหน้าที่ยังไม่ได้ตั้งลิงก์ห้อง)</span>');
  } else if(d.queue_state==='waiting'){
    box.style.background='var(--surface)'; box.style.borderColor='var(--border)'; box.style.color='var(--text)';
    box.innerHTML = '⏳ อยู่ในคิว — ลำดับที่ <b style="font-size:18px;color:#92400e;">'+d.position+'</b> จาก '+d.total+' คิว<br><span style="font-size:12px;color:var(--muted);">โปรดรอเจ้าหน้าที่เรียกตรวจ</span>';
  } else {
    box.style.background='var(--surface)'; box.style.borderColor='var(--border)'; box.style.color='var(--muted)';
    box.innerHTML = 'รอ Admin เริ่มตรวจ…';
  }
}

// ══ แถบเรียกเจ้าหน้าที่ระหว่างนับ (โผล่ตั้งแต่ขั้น 1) ══════════
var _helpTimer=null, _hbFormOpen=false, _hbBusy=false;
var HB_BTN='padding:7px 13px;border-radius:8px;font:inherit;font-weight:600;cursor:pointer;white-space:nowrap;';
function stopHelpPoll(){ if(_helpTimer){ clearInterval(_helpTimer); _helpTimer=null; } }
function startHelpPoll(){ stopHelpPoll(); pollHelp(); _helpTimer=setInterval(pollHelp, 10000); }
async function pollHelp(){
  var bar=document.getElementById('helpBar'); if(!bar) return;
  if(!session || !session.site){ bar.style.display='none'; return; }
  var d=null;
  try{
    var res=await fetch(API_URL + '?action=getSiteQueueStatus&site=' + encodeURIComponent(session.site) + '&site_id=' + encodeURIComponent(_siteIdByName(session.site)));
    d=await res.json();
  }catch(e){ return; }
  if(!d || d.status!=='ok') return;
  // ส่งผลแล้ว/อนุมัติแล้ว หรือเป็นตั๋ว review → หน้าจอล็อกจัดการเอง ซ่อนแถบนี้
  if(d.sub_status==='pending' || d.sub_status==='approved' || d.ticket_type==='review'){ bar.style.display='none'; return; }
  renderHelpBar(d);
}
function _hbShell(color,bg,inner){
  return '<div style="border-bottom:1px solid var(--border,#eee);background:'+bg+';">'
    +'<div style="max-width:760px;margin:0 auto;padding:9px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:14px;color:'+color+';">'
    +inner+'</div></div>';
}
function renderHelpBar(d){
  var bar=document.getElementById('helpBar'); if(!bar) return;
  var st=d.queue_state||'none';
  if(_hbFormOpen && st==='none'){ bar.style.display='block'; return; }  // กำลังพิมพ์อยู่ → อย่าทับ
  bar.style.display='block';
  if(st==='checking'){
    var link=d.room_link||'';
    bar.innerHTML=_hbShell('#0f6e56','rgba(16,110,86,.10)',
      '🟢 <b>เจ้าหน้าที่พร้อมคุยแล้ว</b>'+(d.agent_name?(' · '+esc(d.agent_name)):'')
      +(link ? '<button style="'+HB_BTN+'background:#0f6e56;color:#fff;border:none;margin-left:auto;" onclick="window.open(\''+esc(link)+'\',\'_blank\',\'noopener\')">🎥 เข้าห้อง Teams</button>'
             : '<span style="font-size:12px;opacity:.8;margin-left:auto;">(ยังไม่ได้ตั้งลิงก์ห้อง)</span>'));
  } else if(st==='waiting'){
    bar.innerHTML=_hbShell('#92400e','rgba(234,179,8,.14)',
      '⏳ อยู่ในคิว — ลำดับ <b>'+(d.position||'?')+'</b>/'+(d.total||'?')+' · รอเจ้าหน้าที่เรียก'
      +'<button style="'+HB_BTN+'background:#fff;border:1px solid #d6b36a;color:#92400e;margin-left:auto;" onclick="cancelStaff()">ยกเลิกคิว</button>');
  } else {
    bar.innerHTML=_hbShell('var(--text,#333)','var(--surface,#faf9f6)',
      '<span style="opacity:.75;">ติดปัญหาระหว่างนับ?</span>'
      +'<button style="'+HB_BTN+'background:var(--accent,#b8893d);color:#fff;border:none;margin-left:auto;" onclick="hbOpenForm()">🙋 เรียกเจ้าหน้าที่</button>');
  }
}
function hbOpenForm(){
  _hbFormOpen=true;
  var bar=document.getElementById('helpBar'); if(!bar) return;
  bar.style.display='block';
  bar.innerHTML='<div style="border-bottom:1px solid var(--border,#eee);background:var(--surface,#faf9f6);">'
    +'<div style="max-width:760px;margin:0 auto;padding:10px 14px;">'
    +'<div style="font-size:13px;color:var(--muted,#777);margin-bottom:6px;">🙋 เรียกเจ้าหน้าที่ — พิมพ์เรื่องที่ต้องการให้ช่วย (ไม่บังคับ)</div>'
    +'<textarea id="hbNote" rows="2" maxlength="300" placeholder="เช่น พาเลทชำรุด ถ่ายรูปไม่ได้ / ยอดระบบไม่ตรง" '
    +'style="width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid var(--border,#ddd);border-radius:8px;font:inherit;resize:vertical;"></textarea>'
    +'<div style="display:flex;gap:8px;margin-top:8px;">'
    +'<button style="'+HB_BTN+'flex:1;background:var(--accent,#b8893d);color:#fff;border:none;" onclick="callStaff()">ส่งเข้าคิว</button>'
    +'<button style="'+HB_BTN+'background:#fff;border:1px solid var(--border,#ddd);color:var(--text,#555);" onclick="hbCloseForm()">ยกเลิก</button>'
    +'</div></div></div>';
  var t=document.getElementById('hbNote'); if(t) t.focus();
}
function hbCloseForm(){ _hbFormOpen=false; pollHelp(); }
async function callStaff(){
  if(_hbBusy) return; _hbBusy=true;
  var t=document.getElementById('hbNote'); var note=t?t.value.trim():'';
  _hbFormOpen=false;
  try{
    await fetch(API_URL, { method:'POST', redirect:'follow', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({ action:'enqueueHelp', site:session.site, note:note }) });
    if(typeof showToast==='function') showToast('🙋 ส่งคำขอเข้าคิวแล้ว — รอเจ้าหน้าที่เรียก', 'success');
  }catch(e){}
  _hbBusy=false; pollHelp();
}
async function cancelStaff(){
  if(_hbBusy) return; _hbBusy=true;
  try{
    await fetch(API_URL, { method:'POST', redirect:'follow', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({ action:'dequeueHelp', site:session.site }) });
    if(typeof showToast==='function') showToast('ยกเลิกคิวแล้ว', '');
  }catch(e){}
  _hbBusy=false; pollHelp();
}

async function checkStatus() {
  var site = document.getElementById('selSite').value;
  if (!site) return;
  var btn = document.getElementById('btnCheckStatus');
  var box = document.getElementById('statusBox');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>กำลังตรวจสอบ…';
  box.style.display = 'none';

  var d = null;
  try {
    var res = await fetch(API_URL + '?action=checkSiteStatus&site=' + encodeURIComponent(site) + '&site_id=' + encodeURIComponent(_siteIdByName(site)));
    d = await res.json();
  } catch(e) {}
  btn.innerHTML = '🔍 ตรวจสอบสถานะอีกครั้ง'; btn.disabled = false;

  if (!d || d.status !== 'ok') {
    box.style.display = 'block';
    box.style.background = 'rgba(220,53,69,.1)'; box.style.color = 'var(--danger)';
    box.innerHTML = '⚠ ตรวจสอบสถานะไม่สำเร็จ ลองใหม่อีกครั้ง';
    return;
  }

  box.style.display = 'block';
  var cs = document.getElementById('checkinSection');
  var ac = document.getElementById('afterCheckin');

  if (d.gate === 'blocked') {
    // เคยส่งข้อมูลแล้ว (รออนุมัติ/อนุมัติแล้ว) — บล็อก
    var label = d.sub_status === 'approved' ? 'อนุมัติแล้ว (ปิดงาน)' : 'ส่งข้อมูลแล้ว รอตรวจสอบ';
    box.style.background = 'rgba(220,53,69,.1)'; box.style.color = 'var(--danger)';
    box.innerHTML = '🚫 <b>Site นี้'+label+'</b><br>ไม่สามารถเช็คอิน/นับซ้ำได้';
    cs.style.display = 'none'; ac.style.display = 'none';
    return;
  }

  if (d.gate === 'rejected') {
    // ถูกตีกลับ — ข้ามเช็คอิน เข้าไปแก้ได้เลย
    _bookReady = true;
    box.style.background = 'rgba(245,158,11,.12)'; box.style.color = '#a16207';
    box.innerHTML = '↩️ <b>Site นี้ถูกตีกลับให้แก้ไข</b><br>ข้ามการเช็คอิน — กรอกชื่อแล้วเข้าไปแก้ไขข้อมูลได้เลย';
    cs.style.display = 'none';
    ac.style.display = 'block';
    var bw0 = document.getElementById('bookHint'); if (bw0) bw0.style.display = 'none';
    setTimeout(function(){ ac.scrollIntoView({behavior:'smooth',block:'nearest'}); var n=document.getElementById('inputName'); if(n) n.focus(); }, 60);
    return;
  }

  // gate === 'ok'
  _bookReady = !!d.hasBook;
  var bk = d.book || {loscam:0,chep:0,brs:0,swwi:0,total:0};
  if (d.hasBook) {
    box.style.background = 'rgba(16,110,86,.1)'; box.style.color = 'var(--success,#0f6e56)';
    box.innerHTML = '<div style="font-size:17px;font-weight:800;margin-bottom:10px;">✅ พร้อมเริ่มนับ</div>'
      +'<div style="border-top:1px solid rgba(0,0,0,.08);padding-top:12px;">'
        +'<div style="font-size:12px;opacity:.85;margin-bottom:2px;">ยอดระบบ (Book) รวม</div>'
        +'<div style="font-size:34px;font-weight:800;line-height:1;margin-bottom:12px;">'
          + Number(bk.total||0).toLocaleString('th-TH')
          + ' <span style="font-size:14px;font-weight:600;opacity:.8;">พาเลท</span></div>'
        +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'
        + [['LOSCAM',bk.loscam],['CHEP',bk.chep],['BRS',bk.brs],['SWWI',bk.swwi]].map(function(p){
            return '<div style="background:rgba(255,255,255,.55);border:1px solid rgba(16,110,86,.25);border-radius:10px;padding:9px 10px;text-align:center;">'
              +'<div style="font-size:11px;font-weight:700;opacity:.75;letter-spacing:.3px;">'+p[0]+'</div>'
              +'<div style="font-size:22px;font-weight:800;line-height:1.15;">'+Number(p[1]||0).toLocaleString('th-TH')+'</div>'
              +'</div>';
          }).join('')
        +'</div>'
      +'</div>';
  } else {
    box.style.background = 'rgba(245,158,11,.12)'; box.style.color = '#a16207';
    box.innerHTML = '⚠ <b>ไม่พร้อมตรวจนับ</b><br>Admin ยังไม่ใส่ยอดระบบ — เช็คอินได้ แต่ยัง<b>เริ่มนับไม่ได้</b> จนกว่า Admin จะใส่ยอด (กด “ตรวจสอบสถานะ” อีกครั้งเมื่อพร้อม)';
  }
  cs.style.display = 'block';
  var bh = document.getElementById('bookHint'); if (bh) bh.style.display = _bookReady ? 'none' : 'block';
  checkName();
  setTimeout(function(){ cs.scrollIntoView({behavior:'smooth',block:'nearest'}); }, 60);
}

function handleCheckinPhoto(input){
  if(!input.files || !input.files.length) return;
  _checkinPhotoFile = input.files[0];   // ถือไว้ใน memory เฉย ๆ — ไม่ลง localStorage
  var reader = new FileReader();

async function doCheckIn() {
  var site = document.getElementById('selSite').value;
  if (!site || !_checkinPhotoFile) return;
  var btn = document.getElementById('btnCheckin');
  var msg = document.getElementById('checkinMsg');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>กำลังเช็คอิน…';

  // อัปรูปขึ้น Drive ทันที (ไม่เก็บใน localStorage)
  if (msg) msg.textContent = 'กำลังอัปโหลดรูป…';
  var photoUrl = '';
  try { photoUrl = await uploadFile(_checkinPhotoFile, { kind:'checkin', site:site, siteId:_siteIdByName(site) }); } catch(e) { photoUrl = ''; }
  if (!photoUrl) {
    if (msg) msg.innerHTML = '<span style="color:var(--danger);">อัปโหลดรูปไม่สำเร็จ ลองใหม่อีกครั้ง</span>';
    btn.disabled = false; btn.innerHTML = '📍 เช็คอินหน้างาน';
    return;
  }

  if (msg) msg.textContent = 'กำลังขอตำแหน่ง (ถ้าอนุญาต)…';
  // best-effort GPS — ได้ก็แนบพิกัด ไม่ได้ก็เช็คอินต่อ
  var coords = await new Promise(function(resolve){
    if (!navigator.geolocation) return resolve(null);
    var done = false;
    var t = setTimeout(function(){ if(!done){ done=true; resolve(null); } }, 6000);
    navigator.geolocation.getCurrentPosition(
      function(p){ if(!done){ done=true; clearTimeout(t); resolve({lat:p.coords.latitude, lng:p.coords.longitude, acc:p.coords.accuracy}); } },
      function(){ if(!done){ done=true; clearTimeout(t); resolve(null); } },
      { enableHighAccuracy:true, timeout:6000, maximumAge:0 }
    );
  });

  try {
    await fetch(API_URL, {
      method:'POST', redirect:'follow', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({ action:'checkIn', site:site, site_id:_siteIdByName(site),
        photo: photoUrl, lat: coords?coords.lat:null, lng: coords?coords.lng:null })
    });
  } catch(e) {}

  var when = new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  btn.innerHTML = '✅ เช็คอินแล้ว ' + when;
  if (msg) msg.innerHTML = coords
    ? '🟢 เช็คอินสำเร็จ · แนบรูป+พิกัดแล้ว — กรอกชื่อผู้นับเพื่อเริ่มนับ'
    : '🟢 เช็คอินสำเร็จ · แนบรูปแล้ว (ไม่มีพิกัด GPS) — กรอกชื่อผู้นับเพื่อเริ่มนับ';
  var after = document.getElementById('afterCheckin');
  if (after){ after.style.display = 'block'; var bh=document.getElementById('bookHint'); if(bh) bh.style.display=_bookReady?'none':'block'; checkName(); setTimeout(function(){ after.scrollIntoView({behavior:'smooth',block:'nearest'}); var n=document.getElementById('inputName'); if(n) n.focus(); }, 60); }
}

function confirmStep1() {
  var site = document.getElementById('selSite').value;
  var name = document.getElementById('inputName').value.trim();
  if (!site || !name) return;
  if (!_bookReady) { showToast('ยังไม่พร้อม — Admin ยังไม่ใส่ยอดระบบ กด “ตรวจสอบยอดระบบอีกครั้ง”', 'warn'); return; }
  session = {
    site    : site,
    site_id : _siteIdByName(site),
    name  : name,
    round : roundInfo.round_name,
    names : {
      pallet     : name,
      admin      : (document.getElementById('inputAdmin')      || {value:''}).value.trim(),
      production : (document.getElementById('inputProduction') || {value:''}).value.trim(),
      fixedasset : (document.getElementById('inputFixedasset') || {value:''}).value.trim(),
      audit      : (document.getElementById('inputAudit')      || {value:''}).value.trim()
    }
  };
  localStorage.setItem('stockCountSession', JSON.stringify(session));
  loadProgress();
  files = [];
  siteSubmission = null;     // จะถูกเซ็ตใหม่จาก fetchBookBalance
  // ดึง book balance + สถานะใบส่งของ site นี้
  fetchBookBalance(site);
  render();
  if (typeof pollHelp === 'function') pollHelp();   // อัปเดตแถบเรียกเจ้าหน้าที่ทันที
}

// ไฮไลต์ขั้นที่ Admin ระบุว่าต้องแก้ (ตอนถูกตีกลับ) + กางเปิดให้
function applyRejectHl(){
  var steps = (siteSubmission && siteSubmission.reject_steps) || [];
  var isRe = siteSubmission && (siteSubmission.status==='rejected'||siteSubmission.status==='reopened');
  if (!isRe || !steps.length) return;
  var hasW = steps.indexOf('count_wood')>=0, hasP = steps.indexOf('count_plastic')>=0;
  var cfg = [
    { id:'step2Card',   on:(hasW||hasP), label:'ต้องแก้ไข: ยอดนับจริง'+((hasW&&hasP)?' (ไม้+พลาสติก)':(hasW?' (ไม้)':' (พลาสติก)')), body:'step2Body' },
    { id:'stepOffCard', on:steps.indexOf('offpcs')>=0, label:'ต้องแก้ไข: พาเลทนอกระบบ PCS', body:'offBody' },
    { id:'step4Card',   on:steps.indexOf('file')>=0,   label:'ต้องแก้ไข: ไฟล์ใบเซ็น', body:null }
  ];
  cfg.forEach(function(c){
    var card=document.getElementById(c.id); if(!card||!c.on) return;
    card.style.border='2px solid #dc2626';
    card.style.boxShadow='0 0 0 3px rgba(220,38,38,.08)';
    var head=card.querySelector('.card-head');
    if(head && !head.querySelector('.rejFlag')){
      var b=document.createElement('div');
      b.className='rejFlag';
      b.style.cssText='flex-basis:100%;width:100%;background:#dc2626;color:#fff;font-size:12px;font-weight:700;padding:5px 10px;border-radius:6px;margin-top:8px;';
      b.textContent='⚠ '+c.label;
      head.appendChild(b);
    }
    if(c.body){ var bd=document.getElementById(c.body); if(bd) bd.style.display='block'; }
  });
}

// ── Bind events ครั้งเดียวตอนสร้าง DOM — ไม่ผูกซ้ำเมื่อสลับ view ──
function _chkIcon(done) {
  return done
    ? '<span style="color:var(--success);font-size:16px;">✅</span>'
    : '<span style="color:var(--muted);font-size:16px;">⭕</span>';
}

function updateSubmitCard() {
  var card = document.getElementById('submitCard');
  var btn  = document.getElementById('btnSubmit');
  var note = document.getElementById('submitNote');
  var chk2 = document.getElementById('chk2');
  var chk4 = document.getElementById('chk4');
  if (!card) return;

  var hasLoc  = locations.length > 0;
  var hasFile = files.length > 0;
  var _isRe   = siteSubmission && (siteSubmission.status==='rejected'||siteSubmission.status==='reopened');
  var ready   = hasLoc && _offDone && hasFile && (_isRe || (_step3Seen && _printed));

  // ปลดล็อกขั้น 3/4 + ปุ่มไปขั้น 3 ทันทีที่มี Location (กันต้อง refresh)
  var goBtn = document.getElementById('btnGoStep3');
  if (goBtn) goBtn.style.display = hasLoc ? '' : 'none';
  var s3c = document.getElementById('step3Card'), s4c = document.getElementById('step4Card');
  if (s3c) { s3c.classList.toggle('locked', !hasLoc); s3c.classList.toggle('active', hasLoc); }
  if (s4c) { s4c.classList.toggle('locked', !hasLoc); s4c.classList.toggle('active', hasLoc); }
  var s3toggle = document.getElementById('step3Toggle');
  if (s3toggle && hasLoc && !s3toggle.textContent.trim()) s3toggle.textContent = '▸ แสดง';

  card.style.display = 'flex';
  card.classList.toggle('ready', ready);

  if (chk2) {
    chk2.innerHTML = _chkIcon(hasLoc)+'ขั้นที่ 2 — กรอกยอดนับ ('+(hasLoc?locations.length+' Location':'ยังไม่มี Location')+')';
    chk2.className = 'step-check '+(hasLoc?'done':'pending');
  }
  var chkOff = document.getElementById('chkOff');
  if (chkOff) {
    chkOff.innerHTML = _chkIcon(_offDone)+'ขั้นที่ 3 — พาเลทนอกระบบ PCS '+(_offDone?_offSummaryTxt():'<span style="color:var(--warn);">(กด “จบขั้นที่ 3 — ไปสรุป”)</span>');
    chkOff.className = 'step-check '+(_offDone?'done':'pending');
  }
  var chk3a = document.getElementById('chk3a');
  var chk3b = document.getElementById('chk3b');
  if (chk3a) {
    chk3a.style.display = _isRe ? 'none' : '';
    chk3a.innerHTML = _chkIcon(_step3Seen)+'ขั้นที่ 4 — ตรวจสอบสรุปยอดแล้ว'+(!_step3Seen?' <span style="color:var(--warn);">(กด ▸ แสดง ก่อน)</span>':'');
    chk3a.className = 'step-check '+(_step3Seen?'done':'pending');
  }
  if (chk3b) {
    chk3b.style.display = _isRe ? 'none' : '';
    chk3b.innerHTML = _chkIcon(_printed)+'ขั้นที่ 4 — พิมพ์เอกสารยืนยันแล้ว'+(!_printed?' <span style="color:var(--warn);">(กด 🖨️ พิมพ์เอกสารยืนยัน)</span>':'');
    chk3b.className = 'step-check '+(_printed?'done':'pending');
  }
  if (chk4) {
    chk4.innerHTML = _chkIcon(hasFile)+'ขั้นที่ 5 — Upload รายงาน '+(hasFile?'('+files.length+' ไฟล์)':'(ยังไม่มีไฟล์)');
    chk4.className = 'step-check '+(hasFile?'done':'pending');
  }
  if (btn) btn.disabled = !ready;
  if (note) note.textContent = ready
    ? 'พร้อม Submit — '+locations.length+' Location · '+files.length+' ไฟล์'
    : (!hasLoc      ? 'กรุณาเพิ่มอย่างน้อย 1 Location'
      : !_offDone   ? 'กรุณากด “จบขั้นที่ 3 — ไปสรุป” ก่อน'
      : (!hasFile)  ? 'กรุณา Upload รายงาน (พร้อมลายเซ็น) ก่อน Submit'
      : (!_isRe && !_step3Seen) ? 'กรุณาเปิดดูสรุปยอดในขั้นที่ 4 ก่อน'
      : (!_isRe && !_printed)   ? 'กรุณาพิมพ์เอกสารยืนยันก่อน'
      : '');

  // ── คุมตามสถานะใบส่งผล ──
  var gate = _submitGate();
  if (gate.locked) {                       // approved = ล็อก ห้ามส่งทับ
    if (btn) {
      btn.disabled = true;
      btn.innerHTML = '🔒 ล็อก — ต้องให้ Admin เปิดแก้ไขก่อน';
    }
    if (note) note.textContent = 'ใบนี้ได้รับอนุมัติแล้ว ส่งซ้ำไม่ได้';
  } else if (ready && gate.isRevision) {   // ตีกลับ/เปิดแก้ไข → ส่งเป็นฉบับแก้ไข
    if (btn) btn.innerHTML = '📤 ส่งฉบับแก้ไข (ครั้งที่ '+(siteSubmission.revision+1)+')';
    if (note) note.textContent = 'ส่งแล้วจะเป็นฉบับแก้ไขครั้งที่ '+(siteSubmission.revision+1);
  }
}



function _renderPalletTable(material, brand1cls, brand1name, brand2cls, brand2name) {
  var statusList = material === 'wood' ? WOOD_STATUS : PLASTIC_STATUS;
  var brand1 = brand1name.toLowerCase();
  var brand2 = brand2name.toLowerCase();

  var rows = statusList.map(function(s) {
    var k = _statusKey(s);
    var id1 = 'inp_'+material+'_'+brand1+'_'+k;
    var id2 = 'inp_'+material+'_'+brand2+'_'+k;
    return '<tr>'+
      '<td>'+esc(s)+'</td>'+
      '<td class="inp-cell"><input class="status-input" id="'+id1+'" type="text" inputmode="numeric" pattern="[0-9]*" value=""'+
        ' placeholder="0"'+
        ' oninput="this.value=this.value.replace(/[^0-9]/g,\'\');this.classList.toggle(\'has-val\',this.value!==\'\'&&this.value!==\'0\');_updateLiveTotal()"></td>'+
      '<td class="inp-cell"><input class="status-input" id="'+id2+'" type="text" inputmode="numeric" pattern="[0-9]*" value=""'+
        ' placeholder="0"'+
        ' oninput="this.value=this.value.replace(/[^0-9]/g,\'\');this.classList.toggle(\'has-val\',this.value!==\'\'&&this.value!==\'0\');_updateLiveTotal()"></td>'+
    '</tr>';
  }).join('');

  return '<table class="pallet-table">'+
    '<thead><tr>'+
      '<th>สถานะ</th>'+
      '<th class="'+brand1cls+'-h">'+brand1name+'</th>'+
      '<th class="'+brand2cls+'-h">'+brand2name+'</th>'+
    '</tr></thead>'+
    '<tbody>'+rows+'</tbody>'+
    '<tfoot><tr>'+
      '<td>รวม</td>'+
      '<td id="sub_'+material+'_'+brand1+'">0</td>'+
      '<td id="sub_'+material+'_'+brand2+'">0</td>'+
    '</tr></tfoot>'+
  '</table>';
}

function _updateLiveTotal() {
  var wl=0, wc=0, pb=0, ps=0;
  WOOD_STATUS.forEach(function(s){
    var k = _statusKey(s);
    wl += _getInpVal('wood','loscam',k);
    wc += _getInpVal('wood','chep',k);
  });
  PLASTIC_STATUS.forEach(function(s){
    var k = _statusKey(s);
    pb += _getInpVal('plastic','brs',k);
    ps += _getInpVal('plastic','swwi',k);
  });
  _setEl('sub_wood_loscam',    wl);
  _setEl('sub_wood_chep',      wc);
  _setEl('sub_plastic_brs',    pb);
  _setEl('sub_plastic_swwi',   ps);
  _setEl('woodTotal',    'รวม '+(wl+wc));
  _setEl('plasticTotal', 'รวม '+(pb+ps));
}

function _getInpVal(material, brand, statusKey) {
  var el = document.getElementById('inp_'+material+'_'+brand+'_'+statusKey);
  return el ? (parseInt(el.value.replace(/[^0-9]/g,''),10)||0) : 0;
}

function _setEl(id, val) {
  var el = document.getElementById(id);
  if (el) el.textContent = val;
}

function _readForm() {
  var loc = emptyLoc(document.getElementById('selLocation').value);
  WOOD_STATUS.forEach(function(s){
    var k = _statusKey(s);
    loc.wood.loscam[s] = _getInpVal('wood','loscam',k);
    loc.wood.chep[s]   = _getInpVal('wood','chep',k);
  });
  PLASTIC_STATUS.forEach(function(s){
    var k = _statusKey(s);
    loc.plastic.brs[s]  = _getInpVal('plastic','brs',k);
    loc.plastic.swwi[s] = _getInpVal('plastic','swwi',k);
  });
  // รูปถ่าย
  var pp = document.getElementById('photoPreview');
  if (pp && pp.dataset.photo) loc.photo = pp.dataset.photo;
  // แก้ location เดิมโดยไม่ถ่ายรูปใหม่ → คงลิงก์ไฟล์รูปต้นฉบับไว้ (ไม่ให้กลายเป็น thumbnail)
  if (_editingIdx !== null && locations[_editingIdx] && loc.photo && !/^data:/.test(loc.photo)) {
    var prev = locations[_editingIdx];
    if (prev._photoUrl) loc._photoUrl = prev._photoUrl;
    if (prev._photoId)  loc._photoId  = prev._photoId;
  }
  return loc;
}

function _calcTotals() {
  var t = { loscam:{}, chep:{}, brs:{}, swwi:{} };
  WOOD_STATUS.forEach(function(s){
    t.loscam[s] = locations.reduce(function(a,l){return a+Number(l.wood.loscam[s]||0);},0);
    t.chep[s]   = locations.reduce(function(a,l){return a+Number(l.wood.chep[s]||0);},0);
  });
  PLASTIC_STATUS.forEach(function(s){
    t.brs[s]  = locations.reduce(function(a,l){return a+Number(l.plastic.brs[s]||0);},0);
    t.swwi[s] = locations.reduce(function(a,l){return a+Number(l.plastic.swwi[s]||0);},0);
  });
  t.totLoscam = brandTotal(t.loscam);
  t.totChep   = brandTotal(t.chep);
  t.totBrs    = brandTotal(t.brs);
  t.totSwwi   = brandTotal(t.swwi);
  t.totWood    = t.totLoscam + t.totChep;
  t.totPlastic = t.totBrs    + t.totSwwi;
  t.grand      = t.totWood   + t.totPlastic;
  return t;
}

// ===== ขั้นที่ 3: ตัวช่วยอ่านค่า Book =====
function _bookHas() {
  return bookBalance && (bookBalance.loscam||bookBalance.chep||bookBalance.brs||bookBalance.swwi);
}
function _bk(brand, f) {
  if (!bookBalance || !bookBalance[brand] || bookBalance[brand][f] === undefined) return null;
  return Number(bookBalance[brand][f]) || 0;
}
function _onhand(brand) { return _bk(brand, 'คงเหลือ'); }              // คงเหลืออย่างเดียว
function _due(brand) {                                                  // คงเหลือ + ระหว่างโอนออก
  var a = _bk(brand,'คงเหลือ'), b = _bk(brand,'ระหว่างโอนออก');
  if (a === null && b === null) return null;
  return (a||0) + (b||0);
}
function _cellV(v) { return v === null ? '<span style="color:var(--muted);">—</span>' : v; }
function _varCell(phys, base) {
  if (base === null) return '<span style="color:var(--muted);">—</span>';
  var v = phys - base, col = v>0?'var(--success)':v<0?'var(--danger)':'var(--muted)';
  return '<span style="color:'+col+';font-weight:700;">'+(v>0?'+':'')+v+'</span>';
}
function _s3title(t) {
  return '<div style="font-size:12.5px;font-weight:800;margin:18px 0 6px;color:var(--text);">'+t+'</div>';
}

// บล็อก "จำนวนในระบบ" (PCS) — ตัด "รวมทั้งหมด" ออก ใส่ "รวมยอดคงค้างในบัญชีเช่า" แทน
function _sysBlock(title, h1, h2, b1, b2, c1, c2) {
  var rows = PCS_BOOK_FIELDS.map(function(f){
    return '<tr><td>'+esc(f)+'</td>'+
      '<td class="r" style="color:'+c1+';">'+_cellV(_bk(b1,f))+'</td>'+
      '<td class="r" style="color:'+c2+';">'+_cellV(_bk(b2,f))+'</td></tr>';
  }).join('');
  return _s3title(title)+
  '<table class="status-sum-table">'+
    '<thead><tr><th>รายการ (ระบบ PCS)</th>'+
      '<th class="r" style="color:'+c1+';">'+h1+'</th>'+

}

// บล็อก "จำนวนนับจริง" + Variance (นับจริง − คงเหลือ)
function _countBlock(title, statuses, h1, h2, b1, b2, c1, c2, tot, t1, t2, tAll) {
  var rows = statuses.map(function(s){
    var x = tot[b1][s]||0, y = tot[b2][s]||0;
    return '<tr><td>'+esc(s)+'</td>'+
      '<td class="r" style="color:'+c1+';">'+x+'</td>'+
      '<td class="r" style="color:'+c2+';">'+y+'</td></tr>';
  }).join('');
  return _s3title(title)+
  '<table class="status-sum-table">'+
    '<thead><tr><th>รายการ (นับจริง)</th>'+
      '<th class="r" style="color:'+c1+';">'+h1+'</th>'+
      '<th class="r" style="color:'+c2+';">'+h2+'</th></tr></thead>'+
    '<tbody>'+rows+'</tbody>'+
    '<tfoot>'+
      '<tr class="bold-row"><td>รวม</td><td class="r">'+t1+'</td><td class="r">'+t2+'</td></tr>'+
      '<tr class="bold-row" style="background:var(--accent-bg);"><td>± Variance (นับจริง − คงเหลือ)</td>'+
        '<td class="r">'+_varCell(t1, _onhand(b1))+'</td>'+
        '<td class="r">'+_varCell(t2, _onhand(b2))+'</td></tr>'+

  return pend +
    _sysBlock('① จำนวนในระบบ — พาเลทไม้ 🪵', 'LOSCAM','CHEP','loscam','chep','var(--loscam)','var(--chep)') +

    _sysBlock('③ จำนวนในระบบ — พาเลทพลาสติก 🟧', 'BRS','SWWI','brs','swwi','var(--brs)','#2e7d32') +

function toggleStep3() {
  var body   = document.getElementById('step3Body');
  var toggle = document.getElementById('step3Toggle');
  if (!body) return;
  if (locations.length === 0) { showToast('กรุณาบันทึกอย่างน้อย 1 Location ก่อน', 'warn'); return; }
  var hidden = body.style.display === 'none';
  if (hidden) body.innerHTML = _buildStep3Body(); // สร้างสรุปใหม่จากยอดล่าสุดทุกครั้งที่เปิด
  body.style.display = hidden ? '' : 'none';
  if (toggle) {
    toggle.textContent = hidden ? '▾ ซ่อน' : '▸ แสดง';
    toggle.style.color = hidden ? 'var(--muted)' : 'var(--accent)';
  }
  if (hidden) {
    _step3Seen = true;
    updateSubmitCard();
  }
}

// พับ/ขยายขั้นที่ 2 (ฟอร์มนับ)
function toggleStep2() {
  var body = document.getElementById('step2Body');
  var tog  = document.getElementById('step2Toggle');
  if (!body) return;
  var hidden = body.style.display === 'none';
  body.style.display = hidden ? '' : 'none';
  if (tog) tog.textContent = hidden ? '' : '▸ กลับไปแก้การนับ';
}

// ปุ่ม "ไปขั้นที่ 3" — พับขั้น 2 + ปลดล็อก + เปิดสรุป + เลื่อนไปหา
function goStep3() {
  if (locations.length === 0) { showToast('กรุณาบันทึกอย่างน้อย 1 Location ก่อน', 'warn'); return; }
  // พับซ่อนขั้นที่ 2
  var s2body = document.getElementById('step2Body');
  var s2tog  = document.getElementById('step2Toggle');
  if (s2body) s2body.style.display = 'none';
  if (s2tog)  s2tog.textContent = '▸ กลับไปแก้การนับ';
  // ปลดล็อกขั้น 3 (นอกระบบ) / 4 (สรุป) / 5 (upload)
  ['stepOffCard','step3Card','step4Card'].forEach(function(id){
    var c = document.getElementById(id);
    if (c) { c.classList.remove('locked'); c.classList.add('active'); }
  });
  // ไปหยุดที่ขั้น 3 (นอกระบบ PCS) — ไม่เปิดสรุปอัตโนมัติ
  var offc = document.getElementById('stepOffCard');
  if (offc) setTimeout(function(){ offc.scrollIntoView({ behavior:'smooth', block:'start' }); }, 60);
}

// จบขั้นที่ 3 (นอกระบบ) → พับซ่อน + ไปสรุป · ไม่กรอกอะไร = ข้ามอัตโนมัติ
function finishStep3() {
  if (!_offOk()) { showToast('มีพาเลทนอกระบบ ต้องแนบไฟล์หลักฐานก่อน', 'warn'); return; }
  _offDone = true;
  // พับซ่อนขั้นที่ 3 (เหมือนขั้นที่ 2)
  var ob = document.getElementById('offBody');
  var ot = document.getElementById('offToggle');
  if (ob) ob.style.display = 'none';
  if (ot) ot.textContent = '▸ กลับไปแก้ไข';
  goStep4();
}
// พับ/ขยายการ์ดขั้นที่ 3
function toggleOff() {
  var ob = document.getElementById('offBody');
  var ot = document.getElementById('offToggle');
  if (!ob) return;
  var hidden = ob.style.display === 'none';
  ob.style.display = hidden ? 'block' : 'none';
  if (ot) ot.textContent = hidden ? '' : '▸ กลับไปแก้ไข';
}
// เปิดสรุป (ขั้นที่ 4)
function goStep4() {
  var s3 = document.getElementById('step3Card');
  if (s3) { s3.classList.remove('locked'); s3.classList.add('active'); }
  var body = document.getElementById('step3Body');
  if (body && body.style.display === 'none') toggleStep3();  // เปิด + set _step3Seen
  else { _step3Seen = true; }
  updateSubmitCard();
  if (s3) setTimeout(function(){ s3.scrollIntoView({ behavior:'smooth', block:'start' }); }, 60);
}

// ============================================================
//  3 view functions — เขียน DOM โดยตรง ไม่ผ่าน render()
// ============================================================
function _renderLocRow(l, i) {
  var wl = brandTotal(l.wood.loscam);
  var wc = brandTotal(l.wood.chep);
  var pb = brandTotal(l.plastic.brs);
  var ps = brandTotal(l.plastic.swwi);
  var lt = wl + wc + pb + ps;
  var isEditing = (_editingIdx === i);
  return '<div class="loc-item'+(isEditing?' loc-item-editing':'')+'" id="locRow_'+i+'">'+
    '<div class="loc-item-top"><span class="loc-name">'+(isEditing?'✏️ ':'')+esc(l.name)+'</span></div>'+
    '<div class="loc-item-bot">'+
      '<span class="loc-chip loscam">L '+wl+'</span>'+
      '<span class="loc-chip chep">C '+wc+'</span>'+
      '<span class="loc-chip brs">B '+pb+'</span>'+
      '<span class="loc-chip swwi">S '+ps+'</span>'+
      '<span class="loc-total">'+lt+'</span>'+
      '<button class="loc-act edit" onclick="editLocation('+i+')">✏️ แก้ไข</button>'+
      '<button class="loc-act del" onclick="removeLocation('+i+')">✕</button>'+
    '</div></div>';
}

function refreshLocList() {
  var c = document.getElementById('locListContainer');
  var label = document.getElementById('savedSectionLabel');
  if (!c) return;
  c.innerHTML = locations.map(_renderLocRow).join('');
  if (label) {
    label.textContent = 'รายการที่บันทึกแล้ว ('+locations.length+')';
    label.style.display = locations.length ? '' : 'none';
  }
  // ── Force repaint บน iOS Safari ──
  // iOS Safari บางเวอร์ชันไม่ repaint innerHTML ที่เปลี่ยนถ้า element
  // อยู่นอก viewport หรือ keyboard บังอยู่ ต้อง force reflow ด้วยมือ
  c.style.display = 'none';
  void c.offsetHeight; // trigger reflow
  c.style.display = '';
}

// ── เคลียร์ฟอร์มกลับเป็นค่าว่าง — ใช้ตอนบันทึกสำเร็จหรือกด "เพิ่มใหม่" ──
function _clearForm() {
  var sel = document.getElementById('selLocation');
  if (sel) {
    sel.blur(); // ปิด keyboard ก่อน — ลด race condition กับ iOS repaint
    sel.value = '';
    sel.style.borderColor = '';
  }
  document.querySelectorAll('#formBox .status-input').forEach(function(inp){
    inp.value = '';
    inp.classList.remove('has-val');
  });
  var pp = document.getElementById('photoPreview');
  if (pp) { pp.innerHTML = '📷'; delete pp.dataset.photo; }
  _updateLiveTotal();
}

function _setFormMode(editIdx) {
  var isEdit = (editIdx !== undefined && editIdx !== null);
  document.getElementById('formCardTitle').textContent = isEdit ? '✏️ แก้ไข Location' : 'เพิ่ม Location ใหม่';
  document.getElementById('formIcon').textContent = isEdit ? '✏️' : '📍';
  document.getElementById('formTitle').textContent = isEdit ? 'แก้ไข Location: '+locations[editIdx].name : 'เพิ่ม Location ใหม่';
  document.getElementById('formSub').textContent = isEdit ? 'แก้ไขยอดนับแล้วกด "บันทึก"' : 'กรอกชื่อและยอดพาเลท แล้วกดบันทึก';
  document.getElementById('formBox').style.background = isEdit ? '#fff8e1' : 'var(--accent-bg)';
  document.getElementById('formBox').style.borderColor = isEdit ? 'var(--accent)' : 'var(--border2)';
  document.getElementById('btnCancelEdit').style.display = isEdit ? 'block' : 'none';
  var saveBtn = document.getElementById('btnSaveLocation');
  saveBtn.className = 'btn ' + (isEdit ? 'btn-primary' : 'btn-success');
  saveBtn.textContent = isEdit ? '💾 บันทึกการแก้ไข' : '💾 บันทึก Location นี้';
}

function _fillFormFromLocation(i) {
  var loc = locations[i];
  if (!loc) return;
  _setFormMode(i);
  var sel = document.getElementById('selLocation');
  sel.value = loc.name;
  WOOD_STATUS.forEach(function(s){
    var k = _statusKey(s);
    var el = document.getElementById('inp_wood_loscam_'+k);
    if (el){ el.value = loc.wood.loscam[s]||''; el.classList.toggle('has-val',(loc.wood.loscam[s]||0)>0); }
    el = document.getElementById('inp_wood_chep_'+k);
    if (el){ el.value = loc.wood.chep[s]||''; el.classList.toggle('has-val',(loc.wood.chep[s]||0)>0); }
  });
  PLASTIC_STATUS.forEach(function(s){
    var k = _statusKey(s);
    var el = document.getElementById('inp_plastic_brs_'+k);
    if (el){ el.value = loc.plastic.brs[s]||''; el.classList.toggle('has-val',(loc.plastic.brs[s]||0)>0); }
    el = document.getElementById('inp_plastic_swwi_'+k);
    if (el){ el.value = loc.plastic.swwi[s]||''; el.classList.toggle('has-val',(loc.plastic.swwi[s]||0)>0); }
  });
  var pp = document.getElementById('photoPreview');
  if (loc.photo) { pp.innerHTML = '<img src="'+loc.photo+'" style="width:100%;height:100%;object-fit:cover;">'; pp.dataset.photo = loc.photo; }
  else { pp.innerHTML = '📷'; delete pp.dataset.photo; }
  _updateLiveTotal();
}

function editLocation(i) {
  _editingIdx = i;
  _fillFormFromLocation(i);
  refreshLocList();
  var b2 = document.getElementById('step2Body'); // ขยายขั้น 2 คืน ถ้าถูกพับ
  if (b2) b2.style.display = '';
  var t2 = document.getElementById('step2Toggle'); if (t2) t2.textContent = '';
  var card = document.getElementById('step2Card');
  if (card) card.scrollIntoView({ behavior:'smooth', block:'start' });
}

function cancelEditMode() {
  _editingIdx = null;
  _setFormMode();
  _clearForm();
  refreshLocList();
}

function openPhotoChoice() {
  var modal = document.getElementById('photoChoiceModal');
  if (modal) modal.classList.add('open');
}

function closePhotoChoice() {
  var modal = document.getElementById('photoChoiceModal');
  if (modal) modal.classList.remove('open');
}

function handlePhoto(input) {
  if (!input.files || !input.files.length) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var pp = document.getElementById('photoPreview');
    if (!pp) return;
    pp.innerHTML = '<img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover;">';
    pp.dataset.photo = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

function _showFormMsg(msg, isError) {
  var el = document.getElementById('formMsg');
  if (!el) return;
  el.textContent = msg;
  el.style.color = isError ? 'var(--danger)' : 'var(--success)';
}

function addLocation() {
  var selEl = document.getElementById('selLocation');
  if (!selEl) return;
  var locName = (selEl.value || '').trim();

  if (!locName) {
    _showFormMsg('⚠️ กรุณากรอกชื่อ Location', true);
    selEl.style.borderColor = 'var(--danger)';
    selEl.focus();
    return;
  }
  var dup = locations.find(function(l, idx){ return l.name === locName && idx !== _editingIdx; });
  if (dup) {
    _showFormMsg('⚠️ "'+locName+'" มีอยู่แล้ว — กรุณาใช้ชื่ออื่น', true);
    selEl.style.borderColor = 'var(--danger)';
    selEl.focus();
    selEl.select();
    return;
  }

  selEl.style.borderColor = '';
  var loc = _readFormManual(locName);

  if (_editingIdx !== null) {
    locations[_editingIdx] = loc;
    saveProgress();
    refreshLocList();
    _showFormMsg('✅ บันทึกการแก้ไข "'+locName+'" แล้ว', false);
    _editingIdx = null;
    _setFormMode();
    _clearForm();
  } else {
    locations.push(loc);
    saveProgress();
    refreshLocList();
    _showFormMsg('✅ บันทึก "'+locName+'" แล้ว — กรอก Location ถัดไปได้เลย', false);
    _clearForm();
  }

  updateSubmitCard();

  // เลื่อนลงไปให้เห็น location ที่เพิ่งบันทึก (อยู่ล่างสุดของ list)
  setTimeout(function(){
    var rows = document.querySelectorAll('.loc-item');
    if (rows.length) rows[rows.length-1].scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, 100);

  // เคลียร์ message หลัง 3 วิ
  setTimeout(function(){ _showFormMsg('', false); }, 3000);
}

// อ่านค่าจากฟอร์มโดยใช้ชื่อที่ validate แล้ว (กัน race condition กับ DOM)
function _readFormManual(name) {
  var loc = emptyLoc(name);
  WOOD_STATUS.forEach(function(s){
    var k = _statusKey(s);
    loc.wood.loscam[s] = _getInpVal('wood','loscam',k);
    loc.wood.chep[s]   = _getInpVal('wood','chep',k);
  });
  PLASTIC_STATUS.forEach(function(s){
    var k = _statusKey(s);
    loc.plastic.brs[s]  = _getInpVal('plastic','brs',k);
    loc.plastic.swwi[s] = _getInpVal('plastic','swwi',k);
  });
  var pp = document.getElementById('photoPreview');
  if (pp && pp.dataset.photo) loc.photo = pp.dataset.photo;
  return loc;
}

function removeLocation(i) {
  if (_editingIdx === i) {
    _editingIdx = null;
    _setFormMode();
    _clearForm();
  } else if (_editingIdx !== null && _editingIdx > i) {
    _editingIdx--; // ปรับ index ตามตำแหน่งที่ขยับ
  }
  locations.splice(i, 1);
  saveProgress();
  refreshLocList();
  updateSubmitCard();
}

function updateSubmitBar() { updateSubmitCard(); }

function handleFiles(fileList) {
  Array.from(fileList).forEach(function(f){ files.push(f); });

function handleDrop(e) {

function removeFile(i) {

}

// ── ขั้นที่ 3: พาเลทนอกระบบ PCS (ระดับ Site) + ไฟล์หลักฐาน ──
function _offInput(label,key){
  return '<div class="field" style="margin-bottom:0;"><label>'+label+'</label>'+
    '<input class="input" id="off_'+key+'" type="number" min="0" inputmode="numeric" value="'+(offPcs[key]||0)+'" '+
    'onchange="setOffPcs(\''+key+'\',this.value)" oninput="setOffPcs(\''+key+'\',this.value)"></div>';
}
function setOffPcs(key,val){ offPcs[key]=Math.max(0,Math.floor(Number(val)||0)); _offDone=false; updateSubmitCard(); }
function _offSum(){ return (offPcs.loscam||0)+(offPcs.chep||0)+(offPcs.brs||0)+(offPcs.swwi||0); }
function _offOk(){ return _offSum()===0 || offPcsFiles.length>0; }
function _offSummaryTxt(){ var s=_offSum(); if(s===0) return '(0 — ไม่ต้องแนบไฟล์)'; return '('+s+' พาเลท · '+(offPcsFiles.length?offPcsFiles.length+' ไฟล์':'⚠ ต้องแนบไฟล์')+')'; }
function handleOffFiles(fileList){ Array.from(fileList).forEach(function(f){ offPcsFiles.push(f); }); var el=document.getElementById('offFileList'); if(el) el.innerHTML=_renderOffFileList(); _offDone=false; updateSubmitCard(); }
function _renderOffFileList(){ return offPcsFiles.map(function(f,i){ return '<div class="file-item"><span>📄</span><span class="fname">'+esc(f.name)+'</span><span style="font-size:11px;color:var(--muted);">'+_fmtSize(f.size)+'</span><button class="fdel" onclick="removeOffFile('+i+')" title="ลบ">✕</button></div>'; }).join(''); }
function removeOffFile(i){ offPcsFiles.splice(i,1); var el=document.getElementById('offFileList'); if(el) el.innerHTML=_renderOffFileList(); _offDone=false; updateSubmitCard(); }
function handleOffDrop(e){ e.preventDefault(); var z=document.getElementById('offUploadZone'); if(z) z.classList.remove('drag'); handleOffFiles(e.dataTransfer.files); }

function _renderComparison(tot) {
  var hasB = bookBalance && Object.keys(bookBalance).some(function(k){ return bookBalance[k] && typeof bookBalance[k]==='object'; });

  function val(brand, field) {
    if (!hasB || !bookBalance[brand]) return '—';
    return (bookBalance[brand][field] !== undefined) ? bookBalance[brand][field] : '—';
  }
  function bookTotal(brand) {
    if (!hasB || !bookBalance[brand]) return null;
    return PCS_BOOK_FIELDS.reduce(function(s,f){ return s + (Number(bookBalance[brand][f])||0); }, 0);
  }
  function varNum(phys, book) {
    if (book === null || book === undefined) return '<span style="color:var(--muted);">—</span>';
    var v = phys - book;
    var col = v>0 ? 'var(--success)' : v<0 ? 'var(--danger)' : 'var(--muted)';
    return '<span style="color:'+col+';font-weight:700;">'+(v>0?'+':'')+v+'</span>';
  }

  var html = '';

// ── แปลงวันที่เอกสารให้เป็นรูปแบบ "วว ดดดด ปปปป" (เดือนไทย, ปี พ.ศ.) ──
// รองรับ input: ISO(2026-07-07), 07/07/2026, หรือไทยอยู่แล้ว(7 กรกฎาคม 2569) — แปลงไม่ได้ก็คืนค่าเดิม
var _TH_MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน',
                  'กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
function _thaiDocDate(raw) {
  var s = String(raw == null ? '' : raw).trim();
  if (!s) return '';
  var day, mon0, year, m;
  if ((m = s.match(/^(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})$/))) {            // ISO: yyyy-mm-dd
    year = +m[1]; mon0 = +m[2] - 1; day = +m[3];
  } else if ((m = s.match(/^(\d{1,2})[-/.](\d{1,2})[-/.](\d{4})$/))) {     // dd/mm/yyyy
    day = +m[1]; mon0 = +m[2] - 1; year = +m[3];
  } else if ((m = s.match(/^(\d{1,2})\s+(\S+)\s+(\d{4})$/)) && _TH_MONTHS.indexOf(m[2]) >= 0) { // ไทยอยู่แล้ว → normalize
    day = +m[1]; mon0 = _TH_MONTHS.indexOf(m[2]); year = +m[3];
  } else {
    return s;   // รูปแบบอื่น → คงเดิม ไม่เดามั่ว
  }
  if (mon0 < 0 || mon0 > 11 || !day || day > 31) return s;
  if (year < 2400) year += 543;   // ค.ศ. → พ.ศ. (ตรง convention เดิมของเอกสาร)
  return ('0' + day).slice(-2) + ' ' + _TH_MONTHS[mon0] + ' ' + year;
}

  var site  = (session && session.site ? session.site.replace(/[:\/\\*?"<>|]/g,'_') : 'report');
  var docNo = DOC_NUMBER.replace(/[:\/\\*?"<>|]/g,'_');
  var fname = (sid ? sid + '_' : '') + site + '__print__' + docNo + '.html';

  // ── สร้าง html สำหรับ upload แยกต่างหาก (แทน logo base64 ด้วย text) ──

    '<div class="hdr-logo">'+logoHtml+'</div>',
    '<div class="hdr-logo">'+logoHtmlUpload+'</div>'
  );

    showToast('❌ ไม่พบ API_URL — ตรวจสอบ stockcount_config.js', 'error');
    return;
  }
  // เก็บ html ไว้ใช้กับปุ่ม "พิมพ์ในเบราว์เซอร์"
  _lastPrintHtml = html;
  _lastPrintName = fname;

  showToast('⏳ กำลังสร้างลิงก์เอกสาร...', 'info');
  fetch(API_URL, {
    method: 'POST', redirect: 'follow', headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'uploadPrintFile', filename: fname, html: html })
  })
  .then(function(r){
    var ct = r.headers.get('content-type') || '';
    if (!ct.includes('json')) return r.text().then(function(t){ throw new Error('GAS ตอบไม่ใช่ JSON: ' + t.substring(0,120)); });
    return r.json();
  })
  .then(function(data) {
    if (data.status !== 'ok') throw new Error(data.message || 'upload failed');
    _showPrintLinkModal(data.url, fname);  // url = ลิงก์ download ตรง
    _printed = true; updateSubmitCard();
  })
  .catch(function(err) {
    showToast('❌ สร้างลิงก์ไม่สำเร็จ: ' + err.message + ' — โหลดไฟล์ลงเครื่องแทน', 'error');
    // fallback: download ตรงจากเครื่อง
    var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    var u = URL.createObjectURL(blob);
    var a = document.createElement('a'); a.href = u; a.download = fname;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(u); }, 1000);
    _printed = true; updateSubmitCard();
  });
}
