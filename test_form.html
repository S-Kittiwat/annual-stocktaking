<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Test Form Logic</title>
<style>
body{font-family:sans-serif;background:#f8f6f1;margin:0;padding:16px;}
.wrap{max-width:420px;margin:0 auto;}
h3{margin-bottom:12px;}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;}
.btn-yellow{background:#f5c842;color:#1a1612;}
.btn-green{background:#34d399;color:#0f172a;}
.btn-gray{background:#e2e8f0;color:#334155;}
.inp{width:100%;padding:10px;font-size:14px;border:1.5px solid #d4c99a;border-radius:8px;box-sizing:border-box;margin-bottom:10px;}
.card{background:#fff;border:1.5px solid #e5dfc8;border-radius:10px;padding:14px;margin-bottom:8px;}
.success-box{background:#f0faf0;border:2px solid #34d399;border-radius:10px;padding:20px;text-align:center;}
.loc-item{background:#f3f0e8;border-radius:6px;padding:8px 12px;margin-bottom:6px;font-size:13px;}
.log-box{background:#1e293b;color:#94a3b8;border-radius:8px;padding:10px;font-family:monospace;font-size:11px;max-height:200px;overflow-y:auto;margin-top:16px;}
</style>
</head>
<body>
<div class="wrap">
  <h3>🧪 Test: Form Logic</h3>
  <div id="content"></div>
  <div class="log-box" id="log"></div>
</div>

<script>
var locations    = [];
var _formOpen    = false;
var _formSuccess = false;
var _lastSaved   = null;

function log(msg) {
  var d = document.getElementById('log');
  var t = new Date().toLocaleTimeString('th-TH');
  d.innerHTML += '<div>['+t+'] '+msg+'</div>';
  d.scrollTop = d.scrollHeight;
}

function render() {
  var c = document.getElementById('content');

  if (_formSuccess && _lastSaved) {
    c.innerHTML =
      '<div class="success-box">'+
        '<div style="font-size:36px;">✅</div>'+
        '<div style="font-size:16px;font-weight:700;color:#2e7d32;margin:8px 0;">บันทึก "'+_lastSaved.name+'" แล้ว</div>'+
        '<button class="btn btn-yellow" onclick="openNextForm()">+ เพิ่ม Location ต่อไป</button>'+
        '<button class="btn btn-gray" onclick="closeSuccess()" style="margin-top:8px;">✓ เสร็จแล้ว ดูรายการ</button>'+
      '</div>';
    return;
  }

  if (_formOpen) {
    c.innerHTML =
      '<div class="card" style="background:#fef9ec;border-color:#d4a017;">'+
        '<div style="font-size:13px;font-weight:700;margin-bottom:10px;">📍 เพิ่ม Location ใหม่</div>'+
        '<input id="selLocation" class="inp" type="text" placeholder="ชื่อ Location เช่น Zone A">'+
        '<button class="btn btn-green" onclick="addLocation()">+ บันทึก Location นี้</button>'+
        '<button class="btn btn-gray" onclick="cancelForm()" style="margin-top:6px;">ยกเลิก</button>'+
      '</div>';
    return;
  }

  // list view
  var html = '';
  if (locations.length > 0) {
    html += '<div style="margin-bottom:10px;">';
    locations.forEach(function(l){ html += '<div class="loc-item">'+l+'</div>'; });
    html += '</div>';
  } else {
    html += '<div style="color:#94a3b8;text-align:center;padding:20px;font-size:13px;">ยังไม่มี Location</div>';
  }
  html += '<button class="btn btn-yellow" onclick="openForm()">+ เพิ่ม Location</button>';
  c.innerHTML = html;
}

function openForm() {
  log('openForm: _formOpen=true');
  _formOpen = true;
  render();
}

function cancelForm() {
  _formOpen = false;
  render();
}

function addLocation() {
  var el = document.getElementById('selLocation');
  var name = el ? el.value.trim() : '';
  log('addLocation: name="'+name+'" | el='+(el?'found':'NULL'));

  if (!name) { alert('กรุณากรอกชื่อ Location'); return; }
  var dup = locations.indexOf(name) !== -1;
  if (dup) { log('❌ dup: "'+name+'"'); alert('"'+name+'" มีอยู่แล้ว'); return; }

  locations.push(name);
  log('✅ saved "'+name+'" | total='+locations.length);

  _lastSaved   = { name: name };
  _formOpen    = false;
  _formSuccess = true;
  render();
}

function openNextForm() {
  log('openNextForm: clearing and opening form');
  _formSuccess = false;
  _lastSaved   = null;
  _formOpen    = true;
  render();
  requestAnimationFrame(function(){
    var el = document.getElementById('selLocation');
    log('rAF: selLocation='+(el?'found | value="'+el.value+'"':'NULL'));
    if (el) { el.value = ''; el.focus(); }
  });
}

function closeSuccess() {
  _formSuccess = false;
  _lastSaved   = null;
  _formOpen    = false;
  render();
}

// init
log('init');
render();
</script>
</body>
</html>
